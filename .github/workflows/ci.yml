name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Types
        run: .venv/bin/mypy
      - name: Tests
        run: .venv/bin/pytest -q
      - name: Provenance gate
        run: .venv/bin/vitrine check
      - name: Build renders
        run: .venv/bin/vitrine build --out _site
      - name: Install Playwright browser
        run: .venv/bin/python -m playwright install --with-deps chromium
      - name: Browser tests
        run: .venv/bin/pytest tests/test_browser.py -v
      - name: Render-coverage gate
        run: .venv/bin/vitrine check --against-build _site
      - name: Cross-check (source-topic consistency)
        run: .venv/bin/python scripts/cross_check.py
