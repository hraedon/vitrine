name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Types
        run: .venv/bin/mypy
      - name: Tests
        run: .venv/bin/pytest -q
      - name: Provenance gate
        run: .venv/bin/vitrine check
      - name: Build renders
        run: .venv/bin/vitrine build --out _site
