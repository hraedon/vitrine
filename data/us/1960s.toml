# US, the 1960s. Primary sources: Census F-8 (income), CEX 1960-61 (expenditure),
# Historical Statistics Vol 2 (telephone/diffusion), Census homeownership series.
# Data years: 1960-61. Urban families surveyed by CEX; all families by CPS/F-8.

[room]
country = "us"
decade = "1960s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-median-family-income"
panel = "budget"
label = "Median family income, 1960"
value = "$5,620 (all families), $6,295 (4-person families)"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8 (Table F-8, Size of Family--All Families by Median Income). All families: 45,540 thousand, median $5,620 ($48,760 in 2024 dollars). 4-person families: 9,288 thousand, median $6,295 ($54,620 in 2024 dollars). Average family size: 3.7. By 1969: all-family median $9,433, 4-person median $7,490."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1960s-total-expenditure"
panel = "budget"
label = "Average annual expenditure, 1960-61"
value = "$5,393"
unit = "USD per family per year, nominal (urban families)"
source = "bls-cex"
tier = "A"
notes = "From the 1960-61 Consumer Expenditure Survey data tables (ce_196061_tables.pdf, p.8), OCR'd via GLM-OCR. US average for all urban families. By region: Northeast $5,834, North Central $5,272, South $4,769, West $5,777."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption"]

[[fact]]
id = "us-1960s-expenditure-breakdown"
panel = "budget"
label = "Expenditure breakdown, 1960-61"
value = "Food 24.3%, housing 29.6%, food away from home 5.1%, local telephone $69/yr"
unit = "% of total expenditure ($5,393)"
source = "bls-cex"
tier = "A"
notes = "From CEX 1960-61 (ce_196061_tables.pdf, p.8). Food $1,309 (24.3%), housing $1,594 (29.6%), shelter/fuel/light $991, food away from home $274, household operations $319, local telephone $69. Housing became the largest category — up from 12.95% in 1901. Food dropped from 42.54% (1901) to 24.3%."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-homeownership-rate"
panel = "home"
label = "Homeownership rate, 1960"
value = "61.9%"
unit = "% of occupied housing units owner-occupied"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census homeownership time series (owner.pdf). Up from 55.0% in 1950 and 43.6% in 1940. The postwar boom and suburbanization drove homeownership above 60% for the first time."
assumptions = ["composite-family"]

[[fact]]
id = "us-1960s-plumbing"
panel = "home"
label = "Complete plumbing facilities, 1960"
value = "83% of homes had complete plumbing (17% lacked)"
unit = "% of occupied housing units with hot/cold water + flush toilet + bathtub"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Down from 33% lacking in 1950 to 17% lacking in 1960 — the suburban building boom was closing the gap rapidly. One in six American homes still lacked complete plumbing in 1960. By 1970: only 6% lacked (94% had)."

[[fact]]
id = "us-1960s-heating-fuel"
panel = "home"
label = "House heating fuel, 1960"
value = "Utility gas 43%, fuel oil/kerosene 32%, bottled/LP gas 5%, coal 12%, wood 4%, electricity 2%"
unit = "% of occupied housing units reporting heating fuel"
source = "census-hist-housing-fuels"
tier = "A"
notes = "From the 1960 Census of Housing. Gas overtook coal as the dominant heating fuel between 1950 and 1960. Coal dropped from 55% (1940) to 12% (1960). Electricity was just emerging (1.8%). Source: fuels1960.txt, www2.census.gov."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-food-basket"
panel = "table"
label = "Food expenditure and basket, 1960-61"
value = "Food $1,309/yr (24.3% of expenditure). Food away from home $274 (20.9% of food). Local telephone $69/yr."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From CEX 1960-61 (ce_196061_tables.pdf, p.8). Food was 24.3% of total expenditure — down from 42.54% in 1901. Housing was the largest category at 29.6%. The survey also shows durable goods ownership (p.15): TV 91.4%, refrigerator 84.7%, washing machine 70.0%, air conditioner 18.8%, clothes dryer 18.4%, dishwasher 5.7%, food freezer 15.3%."
assumptions = ["nominal-values", "income-vs-consumption"]

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 1960"
value = "66.6 male, 73.1 female (69.7 total, all races)"
unit = "years at birth"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System (all races). The Historical Statistics Vol 1 (white) shows 67.4 male / 74.1 female for 1960 — the all-races figure is lower. Up from 66.3/72.0 (1949-51). By 1970: 67.1/74.8."

[[fact]]
id = "us-1960s-wages"
panel = "day"
label = "Manufacturing earnings and CPI, 1960"
value = "Manufacturing: $5,352/yr. CPI: 29.6 (1982-84=100)."
unit = "USD/year (earnings) and index (CPI)"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "Manufacturing annual earnings from Historical Statistics Vol 1, Series D 740 (p.186): $5,352 in 1960, rising to $8,150 by 1970. CPI from BLS series CUUR0000SA0 (confirmed via BLS API): 29.6 in 1960, rising to 38.8 by 1970. CPI ratio 1960 to 2024: 313.7/29.6 = 10.6x. Real income growth 1960 to 2024: $5,620 to $105,800 = 18.8x nominal / 10.6x CPI = 1.77x real."
assumptions = ["nominal-values"]

# ── Diffusion panel ────────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-diffusion"
panel = "diffusion"
label = "Technology adoption, 1960-61"
value = "Telephone 78.3% of households. TV 91.4%. Refrigerator 84.7%. Washing machine 70.0%. Air conditioner 18.8%. Dishwasher 5.7%."
unit = "% of households/families"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "Telephone from Historical Statistics Vol 2, Series R 1-3 (p.191, OCR'd via GLM-OCR): 1960 had 74,342K telephones = 407.8 per 1,000 population = 78.3% of households. Durable goods from CEX 1960-61 (ce_196061_tables.pdf, p.15, OCR'd via GLM-OCR): TV 91.4% (up from 12.3% in 1950!), refrigerator 84.7%, washing machine 70.0%, air conditioner 18.8%, clothes dryer 18.4%, dishwasher 5.7%, food freezer 15.3%. Census 1960 also confirms: washing machine 72.2%, TV 90.5%, refrigerator 86.1%."
assumptions = ["composite-family", "urban-rural-split"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1960s-affordability"
panel = "work-buys"
label = "Consumer Price Index and real income growth, 1960-2024"
value = "CPI 29.6 (1960) → 313.7 (2024) = 10.6x. Real median family income grew 1.77x."
unit = "CPI index (1982-84=100) and real growth factor"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 1960: 29.6. 2024: 313.7. Ratio: 10.6x. Nominal median family income: $5,620 (1960) → $105,800 (2024) = 18.8x. Real growth: 18.8/10.6 = 1.77x. For comparison: 1950-2024 CPI ratio was 13.0x, real growth 3.1x — the 1960s-2020s saw slower real income growth than the 1950s-2020s."
assumptions = ["nominal-values", "affordability-normalization"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-1960s-home-production-women"
panel = "day"
label = "Women's weekly unpaid home-production hours, 1965"
value = "40.9"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-1960s-home-production-men"
panel = "day"
label = "Men's weekly unpaid home-production hours, 1965"
value = "11.2"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]
