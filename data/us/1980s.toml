# US, the 1980s. Primary sources: Census F-8 (income), Census historical housing
# (homeownership, home value, plumbing), CEX (expenditure, continuous from 1980).
# RECS began 1978. FRED data available. No Historical Statistics (ends 1970).
# Data year anchors: 1980 (Census), 1980 (F-8).

[room]
country = "us"
decade = "1980s"
wage_anchor = "us-1980s-wages"
income_anchor = "us-1980s-median-income-four-person"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-median-family-income"
panel = "budget"
label = "Median family income, all families, 1980"
quantity = 21020
value = "$21,020"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 60,310 thousand, median $21,020 ($71,470 in 2024 dollars). The stagflation of the 1970s had eroded real wages; the 1980s would see recovery in nominal terms but rising inequality."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1980s-median-income-four-person"
basis = "annual"
amount_minor = 2433000
currency = "USD"
price_year = 1980
panel = "budget"
label = "Median family income, four-person families, 1980"
quantity = 24330
value = "$24,330"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $24,330 ($82,720 in 2024 dollars). Average family size: 3.27."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-1980s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 1980"
quantity = 60310000
value = "60,310,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-1980s-average-family-size"
panel = "budget"
label = "Average family size, 1980"
quantity = 3.27
value = "3.27"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Down from 3.57 in 1970. By 1990: 3.18."

[[fact]]
id = "us-1980s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 1985"
quantity = 29.5
value = "Housing 29.5%, transportation 20.6%, food 15.0%, insurance/pensions 9.8%, entertainment 5.3%, healthcare 4.1%, apparel 6.0%, cash contributions 2.6%, education 1.5%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 1985 Consumer Expenditure Survey, Table 4 (Size of consumer unit). 13,671 thousand 4-person CUs. Total expenditures: $31,408. Income before taxes: $34,414. Expenditure = 91% of gross income. Transportation share peaked in the 1980s at 20.6%. Source: BLS CEX Table 4, 1985 (cusize.pdf via Wayback Machine, web.archive.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-1980s-poverty-rate"
quantity = 13
panel = "budget"
label = "Official poverty rate, 1980"
value = "13.0% (29.3 million people in poverty)"
unit = "% of all people below official poverty level"
source = "census-poverty-historical"
tier = "A"
notes = "From Census Historical Poverty Tables (API: histpov2). Official poverty rate: 13.0%. Family poverty: 11.5%. Poverty rose from 12.6% (1970) due to stagflation and the early 1980s recessions. By 1985: 14.0%."

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-homeownership"
quantity = 64.4
panel = "home"
label = "Homeownership rate, 1980"
value = "64.4%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Up from 62.9% in 1970. High interest rates (mortgage rates peaked ~18% in 1981) would pressure homeownership later in the decade."
assumptions = ["composite-family"]

[[fact]]
id = "us-1980s-median-home-value"
basis = "total"
amount_minor = 4720000
currency = "USD"
price_year = 1980
panel = "home"
label = "Median value of owner-occupied homes, 1980"
value = "$47,200"
unit = "USD, nominal"
source = "census-historical-housing-values"
tier = "A"
notes = "From Census Historical Housing Tables (values-unadj.txt). Up from $17,000 in 1970 — nearly tripling in nominal terms due to 1970s inflation. By 1990: $79,100."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1980s-plumbing"
quantity = 97
panel = "home"
label = "Complete plumbing facilities, 1980"
value = "~97% of homes had complete plumbing (~3% lacked)"
unit = "% of occupied housing units"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Estimated from the series: 1970: 6% lacked, 1990: 1% lacked. By 1980, only ~3% lacked complete plumbing."

[[fact]]
id = "us-1980s-heating-fuel"
panel = "home"
label = "House heating fuel, 1980"
value = "Utility gas 53%, electricity 18%, fuel oil/kerosene 18%, bottled/LP gas 6%, wood 3%, coal 1%"
unit = "% of occupied housing units reporting heating fuel"
source = "census-hist-housing-fuels"
tier = "A"
notes = "From the 1980 Census of Housing. Electricity surged to 18.4% (up from 7.7% in 1970) as heat pumps became affordable. Gas remained dominant but plateaued at 53%. Coal was essentially eliminated (0.6%). Source: fuels1980.txt, www2.census.gov."

[[fact]]
id = "us-1980s-median-home-size"
quantity = 1595
panel = "home"
label = "Median square footage of new single-family homes, 1980"
value = "1,595 sq ft (new construction)"
unit = "median square feet of floor area, new single-family houses completed"
source = "census-soc-new-housing"
tier = "A"
notes = "From the Census Bureau's Survey of Construction (C-25 annual report). New homes were modestly larger than 1973 (1,525). The 1980s saw a dip then recovery: 1982 was 1,520 (recession), 1985 was 1,605, 1989 was 1,850. By 1990: 1,905. Source: c25ann2003.pdf, 'Median and Average Square Feet of Floor Area in New Single-Family Houses Completed.'"

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-life-expectancy"
quantity = 73.7
panel = "day"
label = "Life expectancy at birth, 1980"
value = "70.0 male, 77.5 female (73.7 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System. Up from ~67.1/74.8 in 1970 (all races). The 1980s saw continued gains from cardiovascular disease treatment advances."

[[fact]]
id = "us-1980s-wages"
basis = "hourly"
amount_minor = 685
currency = "USD"
price_year = 1980
panel = "day"
label = "Average hourly earnings and weekly hours, 1980"
value = "$6.85/hr, 35.2 hrs/week (total private). Manufacturing: $7.15/hr, 39.7 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "Production and nonsupervisory employees, seasonally adjusted: FRED AHETPI + AWHNONAG (total private), CES3000000008 + AWHMAN (manufacturing). Annual average of 12 monthly observations, re-verified against FRED 2026-07-08. CAUTION: current CES vintage — the SIC-era published 1980 manufacturing average was $7.27 and is the widely-cited figure; do not 'correct' back to it. By 2024: $30.12/hr."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-telephone"
quantity = 92.9
panel = "diffusion"
label = "Telephone in housing unit, 1980"
value = "92.9% (7.1% without telephone)"
unit = "% of occupied housing units with telephone"
source = "census-hist-housing-phone"
tier = "A"
notes = "From the 1980 Census of Housing, Historical Census of Housing Tables: Telephones. Up from 87.0% (1970), reaching 94.8% by 1990. Telephone was nearly universal by 1980. Source: phone-tab.txt, www2.census.gov."

[[fact]]
id = "us-1980s-air-conditioning"
panel = "diffusion"
label = "Air conditioning, 1980s"
value = "Central AC 23% (1978 RECS) → total AC 68% (1993 RECS)"
unit = "% of households with air conditioning"
source = "eia-recs"
tier = "A"
notes = "No RECS survey falls within the 1980s decade that reports total AC. The 1978 RECS (first survey) found 23% had central AC; by the 1993 RECS, total AC (central + window units) reached 68%. The 1980s were the transition decade when AC shifted from luxury to common. Source: EIA RECS 1978 and 1993."

[[fact]]
id = "us-1980s-cable-tv"
quantity = 50.5
panel = "diffusion"
label = "Cable TV, 1988-1989"
value = "More than 52 million cable customers (50.5% penetration, 1988)"
unit = "households with cable TV subscription"
source = "ncta-cable-history"
tier = "C"
notes = "From NCTA/Syndeo Institute Cable History Timeline. NCTA reports 'more than 52 million cable customers' in 1989, with national cable penetration reaching 50.5 percent (1988). Total industry revenues exceeded $15 billion with 9,050 cable systems. Cable grew rapidly in the 1980s — NCTA reports 14.8 million households subscribed in 1979. Source: NCTA Cable History Timeline (verified 2026-07-08)."

[[fact]]
id = "us-1980s-computer"
panel = "diffusion"
label = "Household computer ownership, 1980s"
value = "8.2% (1984) → 15.0% (1989)"
unit = "% of households with a computer"
source = "census-cps-computer"
tier = "A"
notes = "From Census CPS Computer Use Supplements (reported in P20-522). Household computer ownership doubled in five years: 8.2% in 1984 (first measurement) to 15.0% in 1989. By 1993: 22.8%, by 1997: 36.6%. The personal computer was entering American homes in the 1980s, driven by falling prices and the rise of IBM PC compatibles. Source: Census P20-522, Table A."

[[fact]]
id = "us-1980s-vehicle-ownership"
quantity = 87.1
panel = "diffusion"
label = "Households with at least one vehicle, 1980"
value = "87.1% (12.9% with no vehicle); avg 1.7 vehicles per household"
unit = "% of occupied housing units with 1+ vehicles"
source = "bts-vehicle-availability"
tier = "A"
notes = "From BTS Figure 2-7 (Census Bureau decennial census, 1980). 12.9% had no vehicle, 35.5% had one, 34.0% had two, 17.5% had three or more. The two-car family became the norm — 34% of households had two vehicles, up from 19.0% in 1960. By 1990: 88.5%. Population: all occupied housing units."

[[fact]]
id = "us-1980s-appliance-ownership"
quantity = 82.1
panel = "diffusion"
label = "Household appliance ownership, 1980"
value = "Refrigerator 99.9%, color TV 82.1%, clothes washer 71.6%, clothes dryer 46.9%, dishwasher 37.3%, microwave 14.2%, freezer 25.9%"
unit = "% of households with each appliance"
source = "eia-aer-appliances"
tier = "A"
notes = "From EIA Annual Energy Review 1988, Table 8.3 (republished in Census Bureau, USSR/USA Statistical Abstract 1990). Data sourced from RECS (Form EIA-84). By 1980, refrigerator was universal (99.9%), color TV had reached 82.1% (up from NA in 1978), and the microwave oven was diffusing rapidly (14.2%, up from 7.8% in 1978). By 1987: color TV 92.7%, microwave 60.8%, dishwasher 43.1%. The 1980s were the decade of the microwave."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-food-basket"
quantity = 15
panel = "table"
label = "Food basket and expenditure breakdown, 1985 (CEX)"
value = "Food $4,706/yr (15.0% of expenditure). Food at home $2,900 (62% of food), food away from home $1,806 (38%). Key items: meats/poultry/fish/eggs $832, cereals/bakery $410, dairy $404, fruits/vegetables $425, beef $290, fresh milk $202. Total expenditure: $31,408."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From the 1985 CEX, Table 4. 13,671 thousand 4-person CUs. Food at home share: 62%, food away: 38%. Food away from home was growing as a share of total food expenditure. Source: BLS CEX Table 4, 1985 (via Wayback Machine)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1980s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 1980"
value = "2.24 years ($47,200 home vs $21,020 income)"
unit = "years of median family income (nominal)"
source = "census-historical-housing-values"
tier = "C"
notes = "Computed: 1980 median home value ($47,200) / 1980 median family income ($21,020). Up from 1.72 in 1970 — 1970s inflation had pushed home prices ahead of incomes."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-1980s-cpi"
quantity = 82.4
price_year = 1980
panel = "work-buys"
label = "Consumer Price Index and purchasing power, 1980"
value = "CPI 82.4 (1980) → 313.7 (2024) = 3.8x. $1 in 1980 = $3.81 in 2024. Real median family income grew 1.32x."
unit = "CPI-U (1982-84=100), annual average"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 1980: 82.4. 2024: 313.7. Ratio: 3.81x. Nominal median family income: $21,020 (1980) → $105,800 (2024) = 5.03x. Real growth: 5.03/3.81 = 1.32x. The 1970s inflation had doubled the price level; the 1980s Volcker disinflation brought inflation under control."
assumptions = ["nominal-values", "affordability-normalization"]

[[fact]]
id = "us-1980s-week-of-work-buys"
panel = "work-buys"
label = "What a week of work bought, 1980"
value = "$241.12/week — a full year of it (×52) ≈ 60% of median family income"
unit = "weekly earnings vs annual median family income"
source = "fred-ahetpi"
tier = "A"
notes = "Computed: hourly earnings ($6.85) × weekly hours (35.2) = $241.12/week (total private production/nonsupervisory, FRED AHETPI + AWHNONAG). × 52 = $12,538, which is 59.6% of the all-family median income ($21,020, Census F-8). The single wage no longer supports a family — the two-earner era begins. Compare 1970: 83%, 1990: 51%. Source splice: 1980+ uses total private sector (not manufacturing-specific); see wage-anchor-consistency assumption."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1980s-car-price"
panel = "work-buys"
label = "Average new car transaction price, 1980"
value = "$7,557"
unit = "USD, nominal (average transaction price, domestic + import)"
source = "bea-new-car-price"
tier = "A"
amount_minor = 755700
currency = "USD"
price_year = 1980
basis = "total"
notes = "From BEA Average Transaction Price per New Car (ORNL TEDB Table 11.13). Prices more than doubled in the 1970s due to inflation and the oil shocks. The 1970s saw the rise of imported compact cars (Japanese), which were initially cheaper but eventually exceeded domestic prices. Population: all new passenger cars sold in the US (domestic + import)."
assumptions = ["nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-1980s-home-production-women"
quantity = 28.4
panel = "day"
label = "Women's weekly unpaid home-production hours, 1985"
value = "28.4"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-1980s-home-production-men"
quantity = 13.9
panel = "day"
label = "Men's weekly unpaid home-production hours, 1985"
value = "13.9"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]


[[fact]]
id = "us-1980s-food-prices"
panel = "table"
label = "Retail food prices, December 1980"
value = "Bread $0.52/lb, ground beef $1.86/lb, bacon $1.71/lb, eggs $1.03/doz, lettuce $0.48/lb"
unit = "USD, retail prices (December 1980, BLS API)"
source = "bls-api"
tier = "A"
notes = "From BLS API: APU0000702111 (bread, white, pan, per lb), APU0000703111 (ground chuck, per lb), APU0000704111 (bacon, per lb), APU0000708111 (eggs, per doz), APU0000712211 (lettuce, per lb). Values are December 1980 monthly averages. CORRECTION 2026-07-08: previous version had mismatched labels (same error as 2020s room — series IDs were assigned to wrong food items). Bread at $0.52/lb is 2.2× the 1970 price (23.9¢). Ground beef at $1.86/lb is 1.4× the 1970 price. Food prices surged in the late 1970s due to inflation: the CPI for food rose 8.6% in 1978, 10.9% in 1979, and 8.6% in 1980."

[[fact]]
id = "us-1980s-infant-mortality"
quantity = 12.6
panel = "day"
label = "Infant mortality rate, 1980"
value = "12.6 per 1,000 live births"
unit = "deaths under age 1 per 1,000 live births"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS, Health, United States, 2016, Table 11. All races. Neonatal: 8.5; postneonatal: 4.1. The early 1980s saw a slowdown in decline, then artificial pulmonary surfactant (1989-91) reduced respiratory distress syndrome deaths."
assumptions = ["composite-family"]
