unit = "weekly earnings vs annual median family income"
source = "fred-ahetpi"
tier = "A"
notes = "Computed: hourly earnings ($19.05) × weekly hours (33.4) = $636.27/week (total private production/nonsupervisory, FRED AHETPI + AWHNONAG). × 52 = $33,086, which is 54.9% of the all-family median income ($60,240, Census F-8). A modest recovery from the 2000s trough, but still well below the single-earner era. Compare 2000: 49%, 2024: 60%."
assumptions = ["composite-family", "nominal-values"]

