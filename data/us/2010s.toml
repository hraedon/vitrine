# US, the 2010s. Primary sources: Census F-8 (income), ACS (home value, housing),
# CEX (expenditure), Pew (internet/broadband/smartphone). The decade: smartphone
# ubiquity, streaming, gig economy, opioid crisis, COVID-19 at the end (2020).
# Data year anchors: 2010 (F-8), 2019 (pre-COVID).

[room]
country = "us"
decade = "2010s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-median-family-income"
panel = "budget"
label = "Median family income, all families, 2010"
value = "$60,240"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 79,560 thousand, median $60,240 ($83,640 in 2024 dollars). The Great Recession had reduced real median income from the 2007 peak. Recovery was slow — by 2019, median family income reached ~$86,000 (nominal)."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-2010s-median-income-four-person"
panel = "budget"
label = "Median family income, four-person families, 2010"
value = "$74,750"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $74,750 ($103,800 in 2024 dollars). Average family size: 3.14."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-2010s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 2010"
value = "79,560,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Up from 73,780,000 in 2000."

[[fact]]
id = "us-2010s-average-family-size"
panel = "budget"
label = "Average family size, 2010"
value = "3.14"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Flat from 3.14 in 2000."

[[fact]]
id = "us-2010s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 2013"
value = "Housing 33.0%, transportation 18.3%, food 14.0%, insurance/pensions 11.6%, healthcare 5.8%, entertainment 5.1%, apparel 3.6%, cash contributions 2.6%, education 2.4%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 2013 Consumer Expenditure Survey, Table 1400 (Size of consumer unit). 16,226 thousand 4-person CUs. Total expenditures: $68,299. Income before taxes: $88,828. Expenditure = 77% of gross income. Housing reached 33%. Source: BLS CEX Table 1400, 2013 (cu-size-2013.xlsx from bls.gov/cex/tables.htm)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-2010s-poverty-rate"
panel = "budget"
label = "Official poverty rate, 2010"
value = "15.1% (46.2 million people in poverty)"
unit = "% of all people below official poverty level"
source = "census-poverty-historical"
tier = "A"
notes = "From Census Historical Poverty Tables (API: histpov2). Official poverty rate: 15.1%. Family poverty: 13.2%. Highest poverty rate since 1993 — the Great Recession's impact. Recovery was slow: by 2015 still 13.5%, by 2019: 10.5% (pre-COVID). By 2024: 10.6%."

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-homeownership"
panel = "home"
label = "Homeownership rate, 2010"
value = "65.1%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau. Down from the bubble peak (~69% in 2004-06) due to the foreclosure crisis. The 2010s saw a slow recovery in homeownership."
assumptions = ["composite-family"]

[[fact]]
id = "us-2010s-median-home-value"
panel = "home"
label = "Median home value, 2010"
value = "$179,900"
unit = "USD, nominal (owner-occupied)"
source = "census-acs-homevalue"
tier = "A"
notes = "From ACS Table B25077, 2010 1-year estimates. Post-housing-crash median: down from $240,500 (2019) and $360,600 (2024). The Census Historical Housing Tables (values-unadj.txt) decennial series ends at 2000 ($119,600). Source: censusreporter.org/tables/B25077/."

[[fact]]
id = "us-2010s-heating-fuel"
panel = "home"
label = "House heating fuel, 2015 (RECS)"
value = "Natural gas 51%, electricity 36%, propane 4%, fuel oil 4%, other 5%"
unit = "% of heated homes using each fuel as main space heating source"
source = "eia-recs"
tier = "A"
notes = "From the 2015 RECS. Natural gas remained dominant but was slowly declining (49% in 2009). Electricity continued its rise (34% in 2009 → 36% in 2015), gaining on gas. Fuel oil fell further to ~4% (concentrated in the Northeast at 23%). The long arc: coal dominated in 1940 (55%), gas by 1960 (43%), electricity rising from 2% (1960) to 36% (2015). Source: EIA RECS 2015."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 2010"
value = "76.2 male, 81.0 female (78.7 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System (NVSR Vol 63 No 7). Up from 74.3/79.7 in 2000. Life expectancy peaked at 78.9 in 2014, then declined through 2017 due to the opioid crisis (drug overdose deaths) and suicide. By 2019: 78.8 (pre-COVID). COVID-19 would drop it to 77.0 in 2020 and 76.1 in 2021."

[[fact]]
id = "us-2010s-wages"
panel = "day"
label = "Average hourly earnings and weekly hours, 2010"
value = "$19.05/hr, 33.4 hrs/week (total private). Manufacturing: $18.61/hr, 41.1 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "Production and nonsupervisory employees, seasonally adjusted: FRED AHETPI + AWHNONAG (total private), CES3000000008 + AWHMAN (manufacturing). Annual average of 12 monthly observations, re-verified against FRED 2026-07-08. By 2024: $30.12/hr."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-smartphone"
panel = "diffusion"
label = "Smartphone ownership, 2010s"
value = "~35% (2011) → 81% (2019)"
unit = "% of adults who own a smartphone"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. The smartphone was the defining technology of the 2010s. iPhone launched 2007, Android 2008. By 2011, ~35% of adults had a smartphone. By 2019, 81%. Smartphone ownership crossed 50% around 2013."

[[fact]]
id = "us-2010s-internet"
panel = "diffusion"
label = "Internet and broadband, 2010s"
value = "Internet: 79% (2009) → 90% (2019). Broadband: 63% (2009) → 73% (2019)."
unit = "% of adults"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. Internet adoption plateaued in the 2010s (~90% saturation). Home broadband growth slowed — many low-income households adopted smartphones instead of home broadband, creating a 'smartphone-only' digital divide."

[[fact]]
id = "us-2010s-air-conditioning"
panel = "diffusion"
label = "Air conditioning, 2015 (RECS)"
value = "87% of homes had AC (64% central AC)"
unit = "% of occupied housing units with air conditioning"
source = "eia-recs"
tier = "A"
notes = "From the 2015 RECS. 87% of US homes used AC — flat from 2009 (87%). Central AC rose to 64% (76M households, up from 59%/66M in 2005). The AC diffusion curve had plateaued: from 18.8% (1960) → 68% (1993) → 87% (2009/2015) → 88% (2020). AC was now a standard feature of American housing. Source: EIA RECS 2015 overview."

[[fact]]
id = "us-2010s-cable-tv"
panel = "diffusion"
label = "Cable TV, 2015 (FCC)"
value = "53.2 million cable subscribers (declining). Total MVPD: 99.4 million. Cord-cutting began 2013."
unit = "subscribers (cable MVPD, year-end 2015)"
source = "fcc-video-competition"
tier = "A"
notes = "From FCC 19th Video Competition Report (DA 17-71, data as of year-end 2015, SNL Kagan subscriber data). Cable MVPDs: 53.2M (53.1% of all MVPD). DBS: 33.1M. Telco: 13.0M. Total MVPD: 99.4M. MVPDs lost 1.1M subscribers in 2015 — cord-cutting accelerating. Cable's share of MVPD declined from 89% (1997, 64.2M subscribers) to 53.1% (2015) as satellite (DIRECTV/DISH) and then streaming (Netflix: 46M subscribers by 2016) grew. Over-the-air only: 12.4M TV households."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-food-basket"
panel = "table"
label = "Food basket and expenditure breakdown, 2013 (CEX)"
value = "Food $9,588/yr (14.0% of expenditure). Food at home $5,794 (60% of food), food away from home $3,794 (40%). Key items: meats/poultry/fish/eggs $1,237, fruits/vegetables $1,066, cereals/bakery $822, dairy $615, beef $318. Total expenditure: $68,299."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From the 2013 CEX, Table 1400. 16,226 thousand 4-person CUs. Food at home share: 60%, food away: 40%. Source: BLS CEX Table 1400, 2013 (cu-size-2013.xlsx from bls.gov/cex/tables.htm)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2010s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 2010"
value = "2.99 years ($179,900 home vs $60,240 income)"
unit = "years of median family income (nominal)"
source = "census-acs-homevalue"
tier = "C"
notes = "Computed: 2010 ACS median home value ($179,900) / 2010 Census F-8 median family income ($60,240). Post-crash: home values had dropped but incomes stagnated, making housing less affordable than the 1990s ratio (~2.3). By 2024: $360,600 / ~$104,000 = ~3.5 years."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-2010s-cpi"
panel = "work-buys"
label = "Consumer Price Index and purchasing power, 2010"
value = "CPI 218.1 (2010) → 313.7 (2024) = 1.4x. $1 in 2010 = $1.44 in 2024. Real median family income grew 1.22x."
unit = "CPI-U (1982-84=100), annual average"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 2010: 218.1. 2024: 313.7. Ratio: 1.44x. Nominal median family income: $60,240 (2010) → $105,800 (2024) = 1.76x. Real growth: 1.76/1.44 = 1.22x. Recovery from the Great Recession was slow — real income growth was modest but stronger than the 2000s (1.14x)."
assumptions = ["nominal-values", "affordability-normalization"]

[[fact]]
id = "us-2010s-home-production-women"
panel = "day"
label = "Women's weekly unpaid home-production hours, 2010s"
value = "no reliable record"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey's series ends at 2005. ATUS (available 2010s) measures all-adult household activities, not women-specific home production — a concept splice (Plan 004 Measure guard). The 2020s room carries the ATUS figure (us-2020s-time-use) for the modern endpoint."
assumptions = ["composite-family"]

[[fact]]
id = "us-2010s-home-production-men"
panel = "day"
label = "Men's weekly unpaid home-production hours, 2010s"
value = "no reliable record"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey's series ends at 2005. See us-2010s-home-production-women note re: ATUS concept splice."
assumptions = ["composite-family"]


[[fact]]
id = "us-2010s-food-prices"
panel = "table"
label = "Retail food prices, December 2010"
value = "Bread $1.39/lb, ground beef $2.93/lb, bacon $4.16/lb, eggs $1.79/doz, lettuce $0.99/lb"
unit = "USD, retail prices (December 2010, BLS API)"
source = "bls-api"
tier = "A"
notes = "From BLS API: APU0000702111 (bread, white, pan, per lb), APU0000703111 (ground chuck, per lb), APU0000704111 (bacon, per lb), APU0000708111 (eggs, per doz), APU0000712211 (lettuce, per lb). Values are December 2010 monthly averages. CORRECTION 2026-07-08: previous version had mismatched labels. Bread up 40% from 2000 ($0.99→$1.39), ground beef up 48% ($1.98→$2.93), bacon up 37% ($3.03→$4.16). The 2007-08 and 2010-11 global food price crises drove significant increases. By December 2024: bread $1.91/lb, ground beef $5.58/lb, bacon $6.92/lb — food prices continued rising sharply in the 2020s."
