# US, the 1970s. Primary sources: Census F-8 (income), Historical Statistics
# Vol 1 (life expectancy, manufacturing earnings), Historical Statistics Vol 2
# (telephone), Census historical housing (homeownership, home value, plumbing).
# Data year anchors: 1970 (Census), 1970 (F-8).

[room]
country = "us"
decade = "1970s"
wage_anchor = "us-1970s-hourly-earnings"
income_anchor = "us-1970s-median-income-four-person"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1970s-median-family-income"
panel = "budget"
label = "Median family income, all families, 1970"
quantity = 9867
value = "$9,867"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 52,230 thousand, median $9,867 ($66,700 in 2024 dollars). The 1970s would see stagflation: nominal incomes rose but real purchasing power stagnated."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1970s-median-income-four-person"
basis = "annual"
amount_minor = 1117000
currency = "USD"
price_year = 1970
panel = "budget"
label = "Median family income, four-person families, 1970"
quantity = 11170
value = "$11,170"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $11,170 ($75,490 in 2024 dollars). Average family size: 3.57."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-1970s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 1970"
quantity = 52230000
value = "52,230,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-1970s-average-family-size"
panel = "budget"
label = "Average family size, 1970"
quantity = 3.57
value = "3.57"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Declining from 3.64 in 1947. By 1980: 3.27."

[[fact]]
id = "us-1970s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 1972-73"
quantity = 26.0
value = "Housing 26.0%, transportation 17.6%, food 17.1%, insurance/pensions 8.7%, entertainment 7.8%, healthcare 5.3%, apparel 6.4%, cash contributions 3.7%, education 1.5%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 1972-73 Consumer Expenditure Survey, Bulletin 1992, Table 2 (by family size). 10,668 thousand 4-person families. Total expenditures: $12,226 (current consumption $10,710 + personal insurance/pensions $1,063 + gifts/contributions $453). Income before taxes: $16,155. Expenditure = 76% of gross income. Source: BLS Bulletin 1992, Table 2, accessed via FRASER (fraser.stlouisfed.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-1970s-poverty-rate"
quantity = 12.6
panel = "budget"
label = "Official poverty rate, 1970"
value = "12.6% (25.5 million people in poverty)"
unit = "% of all people below official poverty level"
source = "census-poverty-historical"
tier = "A"
notes = "From Census Historical Poverty Tables (API: histpov2). Official poverty rate: 12.6%. Family poverty: 10.9%. Down sharply from 22.4% (1959) — War on Poverty programs (Medicaid, food stamps, expanded Social Security) and economic growth cut poverty nearly in half."

