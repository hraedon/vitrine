# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1970s-telephone"
quantity = 90.5
panel = "diffusion"
label = "Households with telephone, 1970"
value = "90.5%"
unit = "% of households with telephone"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics Vol 2, Series R 3. 120,218 thousand total phones (583.4 per 1,000 population). Up from 78.3% in 1960. Telephone was nearly universal by 1970."

[[fact]]
id = "us-1970s-telephone-census"
quantity = 87
panel = "diffusion"
label = "Telephone in housing unit, 1970"
value = "87.0% (13.0% without telephone)"
unit = "% of occupied housing units with telephone"
source = "census-hist-housing-phone"
tier = "A"
notes = "From the 1970 Census of Housing, Historical Census of Housing Tables: Telephones. Note: this figure (87.0%) differs from the Historical Statistics Vol 2 figure (90.5%) because the Census measures 'telephone in unit' (housing units) while Hist Stats measures 'households with telephone.' Up from 78.5% (1960), reaching 92.9% by 1980. Source: phone-tab.txt, www2.census.gov."

[[fact]]
id = "us-1970s-air-conditioning"
quantity = 23
panel = "diffusion"
label = "Air conditioning, 1978 (first RECS)"
value = "23% of households had central AC"
unit = "% of households with central air-conditioning equipment"
source = "eia-recs"
tier = "A"
notes = "From the 1978 RECS — the first Residential Energy Consumption Survey. 23% of households had central AC. Total AC (including window/wall units) was 56% (23% central + 33% window/wall); 44% had no AC. Verified via EIA Annual Energy Review, Table 2.6 ('Household End Uses: Fuel Types, Appliances, and Electronics, Selected Years, 1978-2009'), which republishes the 1978 RECS data with explicit source attribution: '1978 and 1979 — EIA, Form EIA-84, RECS.' Available at https://www.eia.gov/totalenergy/data/annual/xls/stb0206.xls. Trajectory: 17% central AC (1973 AHS) → 23% (1978 RECS) → 27% (1980 RECS) → 44% (1993 AHS). By 1993, total AC reached 68%. The 1978 RECS is the closest available data point for the decade."

[[fact]]
id = "us-1970s-vehicle-ownership"
quantity = 82.5
panel = "diffusion"
label = "Households with at least one vehicle, 1970"
value = "82.5% (17.5% with no vehicle)"
unit = "% of occupied housing units with 1+ vehicles"
source = "bts-vehicle-availability"
tier = "A"
notes = "From BTS Figure 2-7 (Census Bureau decennial census, 1970). 17.5% had no vehicle, 47.7% had one, 29.3% had two, 5.5% had three or more. The CEX 1972-73 (Bulletin 1992, Table 1) reports a complementary figure: 80.1% of families had at least one automobile (avg 1.3 per family) — the difference reflects source (Census housing units vs CEX families) and timing (1970 vs 1972-73). This fact uses the BTS/Census figure for series consistency with other decades. By 1980: 87.1%. Population: all occupied housing units."

[[fact]]
id = "us-1970s-appliance-ownership"
quantity = 70.5
panel = "diffusion"
label = "Household appliance ownership, 1978"
value = "Refrigerator 99.7%, color TV (NA in 1978), clothes washer 70.5%, clothes dryer 45.0%, dishwasher 34.6%, microwave 7.8%, freezer 35.2%"
unit = "% of households with each appliance"
source = "eia-aer-appliances"
tier = "A"
notes = "From EIA Annual Energy Review 1988, Table 8.3 (republished in Census Bureau, USSR/USA Statistical Abstract 1990). Data sourced from RECS (Form EIA-84). 1978 is the first RECS survey. Refrigerator was already universal (99.7%). The microwave oven was just beginning its diffusion (7.8%). Compare 1960s: TV 91.4%, refrigerator 84.7%, washing machine 70.0%. The 1970s saw refrigerator reach saturation; color TV data starts in 1980 (82.1%)."

