notes = "From FRED TNWBSHNO (Fed Z.1 Table B.101.h, Q4 1970). Total assets: $4,354B. Total liabilities: $479B. Net worth: $3,876B. Up from $2,091B in 1960. Liabilities grew to 11% of assets — mortgage debt expanding as homeownership rose. Aggregate — NOT median. From 1945 ($592B Goldsmith / $807B Z.1) to 1970 ($3,876B), household wealth grew 5x in 25 years."
