tier = "A"
notes = "From NCHS, Health, United States, 2016, Table 11. All races. Neonatal: 15.1; postneonatal: 4.9. The 1970s saw the steepest decade decline (37%, from 20.0 to 12.6) driven by neonatal medicine advances and regionalization of perinatal services."
assumptions = ["composite-family"]

