unit = "retail food prices (cents per pound/quart/dozen, April 1970)"
source = "statab-food-prices"
tier = "A"
notes = "From 1970 Statistical Abstract Table 530 (BLS data, April 1970 — most recent available). Milk is per quart, delivered. By April 1970, food inflation was accelerating: bread up 18% from 1960, round steak up 26%, milk up 152% (from 26.0¢ to 65.5¢/qt). The 1970s would bring double-digit food price inflation, especially after the 1973-74 oil shock and Soviet grain purchases."

[[fact]]
