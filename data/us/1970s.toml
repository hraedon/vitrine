unit = "median square feet of floor area, new single-family houses completed"
source = "census-soc-new-housing"
tier = "A"
notes = "From the Census Bureau's Survey of Construction (C-25 annual report, Series H-150). 1973 is the first year of data. New-construction median was 1,525 sq ft — this is NOT the median of all existing homes (which would be smaller, as older stock persists). By 1980: 1,595 sq ft. The 2020s room shows 1,500 sq ft for the existing stock (AHS 2023) — new homes grew 60% from 1973 to 2024, but the existing stock median is lower because older, smaller homes remain."

[[fact]]
id = "us-1970s-median-gross-rent"
quantity = 108
panel = "home"
label = "Median gross rent, 1970"
value = "$108/month"
unit = "USD, nominal (median gross rent, specified renter-occupied housing units paying cash rent)"
source = "census-hist-housing-rents"
tier = "A"
notes = "From Census Historical Housing Tables: Gross Rents (grossrents-unadj.txt). Up from $71 in 1960. In 2000 dollars: $415/month."

