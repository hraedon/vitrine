# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1970s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 1970"
value = "1.72 years ($17,000 home vs $9,867 income)"
unit = "years of median family income (nominal)"
source = "census-historical-housing-values"
tier = "C"
notes = "Computed: 1970 median home value ($17,000) / 1970 median family income ($9,867). Up from 0.97 in 1947. The 1970s inflation would push this ratio higher."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-1970s-cpi"
quantity = 38.8
price_year = 1970
panel = "work-buys"
label = "Consumer Price Index and purchasing power, 1970"
value = "CPI 38.8 (1970) → 313.7 (2024) = 8.1x. $1 in 1970 = $8.09 in 2024. Real median family income grew 1.33x."
unit = "CPI-U (1982-84=100), annual average"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 1970: 38.8. 2024: 313.7. Ratio: 8.09x. Nominal median family income: $9,867 (1970) → $105,800 (2024) = 10.7x. Real growth: 10.7/8.1 = 1.33x. For comparison: 1960-2024 real growth was 1.77x, and 1950-2024 was 3.1x — the 1970s-2020s saw the slowest real income growth of the postwar era."
assumptions = ["nominal-values", "affordability-normalization"]

[[fact]]
id = "us-1970s-week-of-work-buys"
panel = "work-buys"
label = "What a week of manufacturing work bought, 1970"
value = "$156.73/week — a full year of it (×52) ≈ 83% of median family income"
unit = "weekly manufacturing earnings vs annual median family income"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "Computed: manufacturing FTE annual earnings ($8,150, Historical Statistics Series D740) ÷ 52 = $156.73/week. × 52 = $8,150, which is 82.6% of the all-family median income ($9,867, Census F-8). Still above 80% — the single manufacturing wage could nearly support a family. But this is the last decade it would do so. Compare 1960: 95%, 1980: 60%. Source: same D740 series as 1940s and 1960s."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1970s-car-price"
panel = "work-buys"
label = "Average new car transaction price, 1970"
value = "$3,543"
unit = "USD, nominal (average transaction price, domestic + import)"
source = "bea-new-car-price"
tier = "A"
amount_minor = 354300
currency = "USD"
price_year = 1970
basis = "total"
notes = "From BEA Average Transaction Price per New Car (ORNL TEDB Table 11.13, Edition 40). Measures the average price consumers actually paid (not wholesale/list). Covers domestic + import passenger cars, excluding pickups, vans, and SUVs. Cross-check: CEX 1972-73 implies ~$3,552 average net outlay per new vehicle purchase ($440.41 annual expenditure / 12.4% reporting), closely matching the BEA figure. The Historical Statistics wholesale average for 1970 was ~$2,214 — the ~60% markup to transaction price reflects dealer margin, options, and taxes."
assumptions = ["nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-1970s-home-production-women"
quantity = 32.1
panel = "day"
label = "Women's weekly unpaid home-production hours, 1975"
value = "32.1"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-1970s-home-production-men"
quantity = 12.1
panel = "day"
label = "Men's weekly unpaid home-production hours, 1975"
value = "12.1"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]


[[fact]]
