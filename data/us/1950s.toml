[[fact]]
id = "us-1950s-plumbing"
quantity = 64.5
panel = "home"
label = "Complete plumbing facilities, 1950"
value = "64.5% of homes had complete plumbing (35.5% lacked)"
unit = "% of occupied housing units with hot/cold water + flush toilet + bathtub"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing (plumbing-tab.txt, US row). Down from 45.3% lacking in 1940 to 35.5% lacking in 1950 (15,772,717 of 44,502,192 occupied units) — the postwar building boom and suburban expansion were starting to close the gap, but more than one in three American homes still lacked complete plumbing. Rural areas lagged badly. By 1960: 16.8% lacked (83.2% had). Figures verified against the Census time-series file 2026-07-07."

[[fact]]
id = "us-1950s-heating-fuel"
panel = "home"
label = "House heating fuel, 1950"
value = "Coal 35%, utility gas 27%, fuel oil/kerosene 23%, wood 10%, bottled/LP gas 2%, electricity 1%"
unit = "% of occupied housing units reporting heating fuel"
source = "census-hist-housing-fuels"
tier = "A"
notes = "From the 1950 Census of Housing, Historical Census of Housing Tables: House Heating Fuel. Coal was still the leading fuel at 35% but dropping rapidly (from 55% in 1940). Utility gas rose from 11% (1940) to 27% (1950) as pipeline networks expanded. Electricity was barely present (0.7%). Source: fuels1950.txt, www2.census.gov."

[[fact]]
id = "us-1950s-television-arrival"
