value = "arriving — 12.3% of households (1950 census)"
unit = "% of households with TV"
source = "census-hc5-02-1950"
tier = "A"
notes = "From 1950 Census of Housing, HC-5 No. 2, Table 1. OCR'd from scanned image PDF at 400 DPI. TV was new — the 1940 census did not ask about it. Urban: 13.7%, rural nonfarm: 6.8%, rural farm: 3.0%. See diffusion panel for full detail."
assumptions = ["composite-family"]

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1950s-food-prices"
panel = "table"
label = "Retail food prices, 1950 (annual average)"
value = "Flour 49.1¢/5lb, bread 14.3¢/lb, round steak 93.6¢/lb, rib roast 74.3¢/lb, pork chops 75.4¢/lb, bacon 63.7¢/lb, butter 72.9¢/lb, milk 20.6¢/qt, eggs 60.4¢/doz, sugar 10.2¢/lb, coffee 79.4¢/lb, potatoes 5.9¢/lb"
unit = "cents per unit, nominal (56 large U.S. cities)"
source = "bls-bulletin-1055-1952"
tier = "A"
notes = "From BLS Bulletin No. 1055, Table 4 (p.9), 'Average retail prices of principal foods in large cities combined, by month, 1950.' Text layer extracted directly via pymupdf — no OCR needed. Annual averages across 56 cities. For comparison with 1901: flour was ~49¢/5lb (the 1903 report collected prices 1890-1902 but per-item prices are in the full 18th Annual Report tables, not the Bulletin summary). For comparison with 2024 (corrected BLS API labels): bread 14.3¢→$1.91/lb (13.4x), ground beef 93.6¢→$5.58/lb (6.0x), bacon 63.7¢→$6.92/lb (10.9x), eggs 60.4¢→$4.15/doz (6.9x)."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1950s-food-basket"
quantity = 24.3
panel = "table"
label = "Food basket and expenditure breakdown, 1960-61 (CEX)"
value = "Food $1,309/yr (24.3% of expenditure), housing $1,594 (29.6%), food away from home $274, local telephone $69/yr. Total expenditure: $5,393."
unit = "USD per family per year, nominal (urban families, 1960-61)"
source = "bls-cex"
tier = "A"
notes = "From the 1960-61 Consumer Expenditure Survey data tables (ce_196061_tables.pdf, p.8), OCR'd via GLM-OCR. US average for all urban families. Food share dropped from 42.54% (1901) to 24.3% (1960-61) — Engels' Law. Housing became the largest category at 29.6%. The survey also shows durable goods ownership (p.15): TV 91.4%, refrigerator 84.7%, washing machine 70.0%, air conditioner 18.8%, clothes dryer 18.4%, dishwasher 5.7%, food freezer 15.3%. TV adoption went from 12.3% (1950 Census) to 91.4% (1960-61) in one decade."
assumptions = ["income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-1950s-car-price"
panel = "table"
label = "Average new car price, 1950"
value = "~$1,511 (Ford Custom); average wholesale ~$1,295"
unit = "USD, nominal"
source = "statab-food-prices"
tier = "C"
amount_minor = 151100
currency = "USD"
price_year = 1950
basis = "total"
notes = "The $1,511 figure is the price of a Ford Custom in 1950 (secondary sources: Reader's Digest, Fifties Web, Brilliantio — all consistent). The Statistical Abstract of the United States, 1953, Table 615 (Motor Vehicles—Factory Sales and Registrations: 1900 to 1951) provides primary-source wholesale data: 6,666,000 passenger cars sold at a wholesale value of $8,633,272,000 = ~$1,295 average wholesale price per car (source: Automobile Manufacturers Association, Automobile Facts and Figures). The retail/transaction price would be higher than wholesale (dealer markup). The Ford Custom at $1,511 was a mid-range model — the average transaction price across all new cars was likely ~$1,500-$2,000. Upgraded from Tier D to Tier C: primary source (Statistical Abstract) provides wholesale value; the $1,511 Ford Custom retail price is confirmed by multiple secondary sources as a representative mid-range model."
assumptions = ["nominal-values", "affordability-normalization", "hours-vs-income-denominator"]

