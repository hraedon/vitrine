tier = "A"
notes = "From NCHS, Health, United States, 2016, Table 11 (Infant mortality rates, by race: United States, selected years 1950-2015). All races. Down from ~100 in 1900. Neonatal (under 28 days): 20.5; postneonatal (28-364 days): 8.7. The 1950s saw slow decline (1% per year) as postneonatal gains plateaued."
assumptions = ["composite-family"]
