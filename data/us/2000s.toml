# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 2000"
value = "2.36 years ($119,600 home vs $50,730 income)"
unit = "years of median family income (nominal)"
source = "census-historical-housing-values"
tier = "C"
notes = "Computed: 2000 median home value ($119,600) / 2000 median family income ($50,730). The housing bubble (2002-2006) would push this ratio far higher before the crash."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-2000s-cpi"
quantity = 172.2
price_year = 2000
panel = "work-buys"
label = "Consumer Price Index and purchasing power, 2000"
value = "CPI 172.2 (2000) → 313.7 (2024) = 1.8x. $1 in 2000 = $1.82 in 2024. Real median family income grew 1.14x."
unit = "CPI-U (1982-84=100), annual average"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 2000: 172.2. 2024: 313.7. Ratio: 1.82x. Nominal median family income: $50,730 (2000) → $105,800 (2024) = 2.09x. Real growth: 2.09/1.82 = 1.14x — the weakest real income growth of any postwar decade, reflecting two recessions (2001, 2008-09) and the housing crash."
assumptions = ["nominal-values", "affordability-normalization"]

[[fact]]
id = "us-2000s-week-of-work-buys"
panel = "work-buys"
label = "What a week of work bought, 2000"
value = "$480.54/week — a full year of it (×52) ≈ 49% of median family income"
unit = "weekly earnings vs annual median family income"
source = "fred-ahetpi"
tier = "A"
notes = "Computed: hourly earnings ($14.01) × weekly hours (34.3) = $480.54/week (total private production/nonsupervisory, FRED AHETPI + AWHNONAG). × 52 = $24,988, which is 49.3% of the all-family median income ($50,730, Census F-8). The trough — a single wage-earner covers less than half the median family income. Compare 1990: 51%, 2010: 55%."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-2000s-car-price"
panel = "work-buys"
label = "Average new car transaction price, 2000"
value = "$21,030"
unit = "USD, nominal (average transaction price, domestic + import)"
source = "bea-new-car-price"
tier = "A"
amount_minor = 2103000
currency = "USD"
price_year = 2000
basis = "total"
notes = "From BEA Average Transaction Price per New Car (ORNL TEDB Table 11.13). Steady price increases continued, driven by technology content and safety features. Note: this series excludes SUVs and light trucks, which captured an increasing market share in the 2000s — the average transaction price including all vehicle types would be higher. Population: all new passenger cars sold in the US."
assumptions = ["nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-2000s-home-production-women"
quantity = 29.3
panel = "day"
label = "Women's weekly unpaid home-production hours, 2005"
value = "29.3"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-2000s-home-production-men"
quantity = 16.8
panel = "day"
label = "Men's weekly unpaid home-production hours, 2005"
value = "16.8"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]


[[fact]]
id = "us-2000s-home-production-household"
quantity = 49
panel = "day"
label = "Total home-production hours per household, 2005"
value = "49"
unit = "hours per week, all household members combined"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009), aggregate home-production hours divided by number of households. Fell from 78 hrs/week (1900) to 49 hrs/week (2005), a 37% decline. Household size fell 45% (4.7→2.6 persons) over the same period, so per-household hours fell proportionally less than household size. Per-capita (all ages) was 18.5 hrs/week — slightly higher in 2005 than 1900 because fewer children (who do little home production) are in the population."
assumptions = ["composite-family"]


[[fact]]
id = "us-2000s-food-prices"
panel = "table"
label = "Retail food prices, December 2000"
value = "Bread $0.99/lb, ground beef $1.98/lb, bacon $3.03/lb, eggs $0.96/doz, lettuce $0.85/lb"
unit = "USD, retail prices (December 2000, BLS API)"
source = "bls-api"
tier = "A"
notes = "From BLS API: APU0000702111 (bread, white, pan, per lb), APU0000703111 (ground chuck, per lb), APU0000704111 (bacon, per lb), APU0000708111 (eggs, per doz), APU0000712211 (lettuce, per lb). Values are December 2000 monthly averages. CORRECTION 2026-07-08: previous version had mismatched labels. Bread up 41% from 1990 ($0.70→$0.99), bacon up 33% ($2.28→$3.03). Ground beef actually decreased slightly ($2.02→$1.98), reflecting changes in beef production. The 2000s saw rising global food demand and the beginning of biofuel-driven corn price increases."

