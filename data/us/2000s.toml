# US, the 2000s. Primary sources: Census F-8 (income), Census historical housing
# (homeownership, home value, plumbing), CEX (expenditure), Pew (internet/broadband).
# ACS began 2000. The decade: 9/11, housing bubble, Great Recession (2007-09).
# Data year anchors: 2000 (Census), 2000 (F-8).

[room]
country = "us"
decade = "2000s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-median-family-income"
panel = "budget"
label = "Median family income, all families, 2000"
value = "$50,730"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 73,780 thousand, median $50,730 ($86,740 in 2024 dollars). The peak of the 1990s boom. The 2000s would see stagnant real median income — the Great Recession (2007-09) would push it down."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-2000s-median-income-four-person"
panel = "budget"
label = "Median family income, four-person families, 2000"
value = "$62,670"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $62,670 ($107,200 in 2024 dollars). Average family size: 3.14."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-2000s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 2000"
value = "73,780,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-2000s-average-family-size"
panel = "budget"
label = "Average family size, 2000"
value = "3.14"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Down from 3.18 in 1990. By 2010: 3.14 (flat)."

[[fact]]
id = "us-2000s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 2005"
value = "Housing 32.2%, transportation 18.6%, food 13.9%, insurance/pensions 12.1%, entertainment 5.1%, healthcare 4.5%, apparel 4.6%, cash contributions 2.6%, education 2.4%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 2005 Consumer Expenditure Survey, Table 4 (Size of consumer unit). 15,807 thousand 4-person CUs. Total expenditures: $62,215. Income before taxes: $78,183. Expenditure = 80% of gross income. Insurance/pensions crossed 12%. Source: BLS CEX Table 4, 2005 (cusize.pdf via Wayback Machine, web.archive.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-homeownership"
panel = "home"
label = "Homeownership rate, 2000"
value = "66.2%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Up from 64.2% in 1990. The housing bubble would push homeownership to a peak of ~69% in 2004-2006 before the Great Recession."
assumptions = ["composite-family"]

[[fact]]
id = "us-2000s-median-home-value"
panel = "home"
label = "Median value of owner-occupied homes, 2000"
value = "$119,600"
unit = "USD, nominal"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Historical Housing Tables (values-unadj.txt). Up from $79,100 in 1990. The housing bubble would drive values far higher by 2006-07 before the crash."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2000s-plumbing"
panel = "home"
label = "Complete plumbing facilities, 2000"
value = "~99.5% of homes had complete plumbing (~0.5% lacked)"
unit = "% of occupied housing units"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Estimated from the series: 1990: 1% lacked, approaching 0% by 2000. Plumbing was universally available."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 2000"
value = "74.3 male, 79.7 female (77.0 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System. Up from 71.8/78.8 in 1990. Life expectancy would peak at 78.9 in 2014 before the opioid crisis and COVID-19."

[[fact]]
id = "us-2000s-wages"
panel = "day"
label = "Average hourly earnings and weekly hours, 2000"
value = "$13.98/hr, 34.3 hrs/week (total private). Manufacturing: $14.33/hr, 41.2 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "From BLS CES, series CES0500000008 and CES0500000007 (total private), CES3000000008 and CES3000000007 (manufacturing), accessed via BLS API. Annual averages from 12 monthly observations. Implied weekly earnings: $479.51 (total private), $590.40 (manufacturing)."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-internet"
panel = "diffusion"
label = "Internet and broadband adoption, 2000s"
value = "Internet: 46% (2000) → 79% (2009). Broadband: ~5% (2000) → 63% (2009)."
unit = "% of adults"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. Internet adoption crossed 50% around 2001. Broadband (DSL/cable) replaced dial-up through the 2000s. By 2009, 63% of adults had home broadband. The smartphone era began with the iPhone (2007) but mass adoption belongs to the 2010s."

[[fact]]
id = "us-2000s-cellphone"
panel = "diffusion"
label = "Cell phone adoption, 2000s"
value = "~40% (2000) → ~85% (2009)"
unit = "% of adults who own a cell phone"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. Cell phone adoption was rapid: ~40% in 2000, ~65% in 2004, ~85% by 2009. The iPhone (2007) and Android (2008) began the smartphone transition."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-food-basket"
panel = "table"
label = "Food basket and expenditure breakdown, 2005 (CEX)"
value = "Food $8,622/yr (13.9% of expenditure). Food at home $4,846 (56% of food), food away from home $3,776 (44%). Key items: meats/poultry/fish/eggs $1,140, fruits/vegetables $780, cereals/bakery $666, dairy $556, beef $344. Total expenditure: $62,215."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From the 2005 CEX, Table 4. 15,807 thousand 4-person CUs. Food at home share: 56%, food away: 44%. Food away from home approaching half of food spending. Source: BLS CEX Table 4, 2005 (via Wayback Machine)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 2000"
value = "2.36 years ($119,600 home vs $50,730 income)"
unit = "years of median family income (nominal)"
source = "census-homeownership-historical"
tier = "C"
notes = "Computed: 2000 median home value ($119,600) / 2000 median family income ($50,730). The housing bubble (2002-2006) would push this ratio far higher before the crash."
assumptions = ["affordability-normalization", "nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-2000s-home-production-women"
panel = "day"
label = "Women's weekly unpaid home-production hours, 2005"
value = "29.3"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-2000s-home-production-men"
panel = "day"
label = "Men's weekly unpaid home-production hours, 2005"
value = "16.8"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]


[[fact]]
id = "us-2000s-home-production-household"
panel = "day"
label = "Total home-production hours per household, 2005"
value = "49"
unit = "hours per week, all household members combined"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009), aggregate home-production hours divided by number of households. Fell from 78 hrs/week (1900) to 49 hrs/week (2005), a 37% decline. Household size fell 45% (4.7→2.6 persons) over the same period, so per-household hours fell proportionally less than household size. Per-capita (all ages) was 18.5 hrs/week — slightly higher in 2005 than 1900 because fewer children (who do little home production) are in the population."
assumptions = ["composite-family"]
