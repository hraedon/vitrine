# US, the 2000s. Primary sources: Census F-8 (income), Census historical housing
# (homeownership, home value, plumbing), CEX (expenditure), Pew (internet/broadband).
# ACS began 2000. The decade: 9/11, housing bubble, Great Recession (2007-09).
# Data year anchors: 2000 (Census), 2000 (F-8).

[room]
country = "us"
decade = "2000s"
wage_anchor = "us-2000s-wages"
income_anchor = "us-2000s-median-income-four-person"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-median-family-income"
quantity = 50730
panel = "budget"
label = "Median family income, all families, 2000"
value = "$50,730"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 73,780 thousand, median $50,730 ($86,740 in 2024 dollars). The peak of the 1990s boom. The 2000s would see stagnant real median income — the Great Recession (2007-09) would push it down."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-2000s-median-income-four-person"
quantity = 62670
basis = "annual"
amount_minor = 6267000
currency = "USD"
price_year = 2000
panel = "budget"
label = "Median family income, four-person families, 2000"
value = "$62,670"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $62,670 ($107,200 in 2024 dollars). Average family size: 3.14."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-2000s-number-of-families"
quantity = 73780000
panel = "budget"
label = "Number of families in the United States, 2000"
value = "73,780,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-2000s-average-family-size"
quantity = 3.14
panel = "budget"
label = "Average family size, 2000"
value = "3.14"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Down from 3.18 in 1990. By 2010: 3.14 (flat)."

[[fact]]
id = "us-2000s-expenditure-shares"
quantity = 32.3
panel = "budget"
label = "Expenditure breakdown, 4-person families, 2005"
value = "Housing 32.3%, transportation 18.6%, food 13.9%, insurance/pensions 12.1%, entertainment 5.1%, healthcare 4.5%, apparel 4.6%, cash contributions 2.6%, education 2.4%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 2005 Consumer Expenditure Survey, Table 4 (Size of consumer unit). 15,807 thousand 4-person CUs. Total expenditures: $62,215. Income before taxes: $78,183. Expenditure = 80% of gross income. Insurance/pensions crossed 12%. Source: BLS CEX Table 4, 2005 (cusize.pdf via Wayback Machine, web.archive.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-2000s-poverty-rate"
quantity = 11.3
panel = "budget"
label = "Official poverty rate, 2000"
value = "11.3% (31.5 million people in poverty)"
unit = "% of all people below official poverty level"
source = "census-poverty-historical"
tier = "A"
notes = "From Census Historical Poverty Tables (API: histpov2). Official poverty rate: 11.3%. Family poverty: 9.6%. Near the pre-recession low. The 2008-09 Great Recession would push poverty to 15.1% by 2010."

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-homeownership"
quantity = 66.2
panel = "home"
label = "Homeownership rate, 2000"
value = "66.2%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Up from 64.2% in 1990. The housing bubble would push homeownership to a peak of ~69% in 2004-2006 before the Great Recession."
assumptions = ["composite-family"]

[[fact]]
id = "us-2000s-median-home-value"
basis = "total"
amount_minor = 11960000
currency = "USD"
price_year = 2000
panel = "home"
label = "Median value of owner-occupied homes, 2000"
value = "$119,600"
unit = "USD, nominal"
source = "census-historical-housing-values"
tier = "A"
notes = "From Census Historical Housing Tables (values-unadj.txt). Up from $79,100 in 1990. The housing bubble would drive values far higher by 2006-07 before the crash."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2000s-plumbing"
quantity = 99.5
panel = "home"
label = "Complete plumbing facilities, 2000"
value = "~99.5% of homes had complete plumbing (~0.5% lacked)"
unit = "% of occupied housing units"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Estimated from the series: 1990: 1% lacked, approaching 0% by 2000. Plumbing was universally available."

[[fact]]
id = "us-2000s-heating-fuel"
panel = "home"
label = "House heating fuel, 2009 (RECS)"
value = "Natural gas 49%, electricity 34%, fuel oil 6%, propane 5%, other 6%"
unit = "% of homes using each fuel as main space heating source"
source = "eia-recs"
tier = "A"
notes = "From the 2009 RECS. Natural gas remained the dominant heating fuel but was declining (from 51% in 2005). Electricity continued its long-term rise (from 29% in 2005 to 34% in 2009). Fuel oil was down to ~6% (from 10%+ in 1993), concentrated in the Northeast. Coal was gone as a heating fuel. Source: EIA RECS 2009."

[[fact]]
id = "us-2000s-median-home-size"
quantity = 2057
panel = "home"
label = "Median square footage of new single-family homes, 2000"
value = "2,057 sq ft (new construction)"
unit = "median square feet of floor area, new single-family houses completed"
source = "census-soc-new-housing"
tier = "A"
notes = "From the Census Bureau's Survey of Construction (C-25 annual report). New homes crossed 2,000 sq ft in 1998 (2,000) and continued rising through the housing boom: 2005 peaked at 2,227 before the crash. 2009 fell to 2,135 (recession). By 2010: 2,169. Source: c25ann2009.pdf."

[[fact]]
id = "us-2000s-median-gross-rent"
quantity = 602
panel = "home"
label = "Median gross rent, 2000"
value = "$602/month"
unit = "USD, nominal (median gross rent, specified renter-occupied housing units paying cash rent)"
source = "census-hist-housing-rents"
tier = "A"
notes = "From Census Historical Housing Tables: Gross Rents (grossrents-unadj.txt). Up from $447 in 1990. Cross-verified: NHGIS 2000 block-group-level data (208,790 BGs) shows median-of-BG-medians of $561, consistent with the Census national figure of $602."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-life-expectancy"
quantity = 77
panel = "day"
label = "Life expectancy at birth, 2000"
value = "74.3 male, 79.7 female (77.0 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System. Up from 71.8/78.8 in 1990. Life expectancy would peak at 78.9 in 2014 before the opioid crisis and COVID-19."

[[fact]]
id = "us-2000s-wages"
basis = "hourly"
amount_minor = 1401
currency = "USD"
price_year = 2000
panel = "day"
label = "Average hourly earnings and weekly hours, 2000"
value = "$14.01/hr, 34.3 hrs/week (total private). Manufacturing: $14.31/hr, 41.2 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "Production and nonsupervisory employees, seasonally adjusted: FRED AHETPI + AWHNONAG (total private), CES3000000008 + AWHMAN (manufacturing). Annual average of 12 monthly observations, re-verified against FRED 2026-07-08."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2000s-internet"
panel = "diffusion"
label = "Internet and broadband adoption, 2000s"
value = "Internet: 46% (2000) → 79% (2009). Broadband: ~5% (2000) → 63% (2009)."
unit = "% of adults"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. Internet adoption crossed 50% around 2001. Broadband (DSL/cable) replaced dial-up through the 2000s. By 2009, 63% of adults had home broadband. The smartphone era began with the iPhone (2007) but mass adoption belongs to the 2010s."

[[fact]]
id = "us-2000s-cellphone"
panel = "diffusion"
label = "Cell phone adoption, 2000s"
value = "~40% (2000) → ~85% (2009)"
unit = "% of adults who own a cell phone"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center. Cell phone adoption was rapid: ~40% in 2000, ~65% in 2004, ~85% by 2009. The iPhone (2007) and Android (2008) began the smartphone transition."

[[fact]]
id = "us-2000s-air-conditioning"
quantity = 87
panel = "diffusion"
label = "Air conditioning, 2009 (RECS)"
value = "87% of homes had AC (61% central AC)"
unit = "% of occupied housing units with air conditioning"
source = "eia-recs"
tier = "A"
notes = "From the 2009 RECS. 87% of US homes used air conditioning — up from 68% in 1993. Central AC alone reached 61% (nearly tripled from 23% in 1978). AC was approaching universality. By 2015, AC remained at 87%, and by 2020, reached 88%. Source: EIA RECS 2009."

[[fact]]
id = "us-2000s-cable-tv"
quantity = 59
panel = "diffusion"
label = "Households with cable TV, 2006"
value = "65.3 million basic cable subscribers (~59% of TV households)"
unit = "subscribers (% of TV households with cable, FCC 13th Report)"
source = "fcc-video-competition"
tier = "A"
notes = "From FCC 13th Annual Video Competition Report (FCC 07-206, data as of June 2006). 110.2M TV households, 95.8M subscribed to MVPD (87%). Cable's share of MVPD: 68.2% = 65.3M basic subscribers. Cable penetration of all TV households: ~59%. This was near the peak — cord-cutting began around 2013. Up from 60% (1992). By 2015: 53.2M subscribers (declining)."

[[fact]]
id = "us-2000s-vehicle-ownership"
quantity = 89.7
panel = "diffusion"
label = "Households with at least one vehicle, 2000"
value = "89.7% (10.3% with no vehicle); avg 1.9 vehicles per household"
unit = "% of occupied housing units with 1+ vehicles"
source = "bts-vehicle-availability"
tier = "A"
notes = "From BTS Figure 2-7 (Census Bureau decennial census, 2000). 10.3% had no vehicle, 34.2% had one, 38.4% had two, 17.1% had three or more. Near-saturation — only one in ten households remained car-free. By 2010: 90.9%. Population: all occupied housing units."

