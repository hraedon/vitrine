tier = "A"
notes = "From FCC 4th Annual Video Competition Report (FCC 97-423, data as of June 1997). 73.6 million MVPD households total; cable's share was 87%. DBS was still niche at ~5 million subscribers (6.85% of MVPD). Average monthly cable rate: $28.83 (July 1997), up 8.5% from $26.57 in July 1996 — cable rates rose >4x CPI."
assumptions = ["composite-family"]

