# US, the 1990s. Primary sources: Census F-8 (income), Census historical housing
# (homeownership, home value, plumbing), CEX (expenditure). RECS, AHS, FRED available.
# Internet diffusion begins (Pew Research from 1995).
# Data year anchors: 1990 (Census), 1990 (F-8).

[room]
country = "us"
decade = "1990s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-median-family-income"
panel = "budget"
label = "Median family income, all families, 1990"
value = "$35,350"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 66,320 thousand, median $35,350 ($77,260 in 2024 dollars). The 1990s boom would push real incomes up significantly by the end of the decade."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1990s-median-income-four-person"
panel = "budget"
label = "Median family income, four-person families, 1990"
value = "$41,450"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $41,450 ($90,590 in 2024 dollars). Average family size: 3.18."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-1990s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 1990"
value = "66,320,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-1990s-average-family-size"
panel = "budget"
label = "Average family size, 1990"
value = "3.18"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Down from 3.27 in 1980. By 2000: 3.14."

[[fact]]
id = "us-1990s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 1996"
value = "Housing 31.3%, transportation 18.7%, food 15.0%, insurance/pensions 10.1%, entertainment 6.0%, healthcare 4.3%, apparel 5.7%, cash contributions 2.1%, education 1.8%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 1996 Consumer Expenditure Survey, Table 4 (Size of consumer unit). 15,261 thousand 4-person CUs. Total expenditures: $43,670. Income before taxes: $50,836. Expenditure = 86% of gross income. Housing crossed 31% for the first time. Source: BLS CEX Table 4, 1996 (cusize.pdf via Wayback Machine, web.archive.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-homeownership"
panel = "home"
label = "Homeownership rate, 1990"
value = "64.2%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Roughly flat from 64.4% in 1980. The 1990s would see a sustained rise as the economy boomed."
assumptions = ["composite-family"]

[[fact]]
id = "us-1990s-median-home-value"
panel = "home"
label = "Median value of owner-occupied homes, 1990"
value = "$79,100"
unit = "USD, nominal"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Historical Housing Tables (values-unadj.txt). Up from $47,200 in 1980. By 2000: $119,600."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1990s-plumbing"
panel = "home"
label = "Complete plumbing facilities, 1990"
value = "99% of homes had complete plumbing (1% lacked)"
unit = "% of occupied housing units"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Down from ~3% lacking in 1980 to 1% lacking in 1990. Plumbing was essentially universal."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 1990"
value = "71.8 male, 78.8 female (75.4 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System. Up from 70.0/77.5 in 1980. The 1990s saw further gains from HIV treatment breakthroughs (HAART, 1996) and declining cardiovascular mortality."

[[fact]]
id = "us-1990s-wages"
panel = "day"
label = "Average hourly earnings and weekly hours, 1990"
value = "$10.19/hr, 34.3 hrs/week (total private). Manufacturing: $10.83/hr, 40.5 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "From BLS CES, series CES0500000008 and CES0500000007 (total private), CES3000000008 and CES3000000007 (manufacturing), accessed via BLS API. Annual averages from 12 monthly observations. Implied weekly earnings: $349.52 (total private), $438.62 (manufacturing)."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-internet"
panel = "diffusion"
label = "Internet adoption, 1995"
value = "~14% of adults (1995), rising to ~46% by 2000"
unit = "% of adults who use the internet"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center Internet & American Life Project. The World Wide Web went public ~1993-94. By 1995, ~14% of adults used the internet; by 2000, ~46%. The 1990s were the decade when the internet entered American homes — initially via dial-up modem."

[[fact]]
id = "us-1990s-diffusion-gap"
panel = "diffusion"
label = "Cell phone, AC, cable TV, computer"
value = "data available via Census/AHS/RECS/Pew — not yet transcribed"
unit = "n/a"
source = "census-ahs"
tier = "D"
notes = "Cell phone adoption was ~10% by 1995, ~40% by 2000. Cable TV ~60% by 1990. Personal computer ~30% by 1995. AC ~70%+ by 1990 (RECS)."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-food-basket"
panel = "table"
label = "Food basket and expenditure breakdown, 1996 (CEX)"
value = "Food $6,535/yr (15.0% of expenditure). Food at home $4,046 (62% of food), food away from home $2,489 (38%). Key items: meats/poultry/fish/eggs $1,064, cereals/bakery $658, fruits/vegetables $638, dairy $448, beef $319. Total expenditure: $43,670."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From the 1996 CEX, Table 4. 15,261 thousand 4-person CUs. Food at home share: 62%, food away: 38%. Source: BLS CEX Table 4, 1996 (via Wayback Machine)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 1990"
value = "2.24 years ($79,100 home vs $35,350 income)"
unit = "years of median family income (nominal)"
source = "census-homeownership-historical"
tier = "C"
notes = "Computed: 1990 median home value ($79,100) / 1990 median family income ($35,350). Flat from 2.24 in 1980 — both home values and incomes roughly doubled in the 1980s."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-1990s-home-production-women"
panel = "day"
label = "Women's weekly unpaid home-production hours, 1990s"
value = "no reliable record"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey (2009) does not report a 1990s benchmark. She explicitly excludes the 1992-94 time use survey ('I do not use the 1992-94 survey because of key missing data such as marital status and the problems with that survey discussed by Robinson and Godbey'). The series jumps from 1985 (28.4 hrs) to 2003 (29.7 hrs). Interpolation would be misleading given the non-monotonic trend. ATUS begins 2003 but measures all adults, not women-specifically."
assumptions = ["composite-family"]

[[fact]]
id = "us-1990s-home-production-men"
panel = "day"
label = "Men's weekly unpaid home-production hours, 1990s"
value = "no reliable record"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey (2009) does not report a 1990s benchmark for men (same gap as women: 1992-94 survey excluded). Series jumps from 1985 (13.9 hrs) to 2003 (17.2 hrs)."
assumptions = ["composite-family"]
