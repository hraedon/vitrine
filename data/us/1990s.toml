# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-internet"
panel = "diffusion"
label = "Internet adoption, 1995"
value = "~14% of adults (1995), rising to ~46% by 2000"
unit = "% of adults who use the internet"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center Internet & American Life Project. The World Wide Web went public ~1993-94. By 1995, ~14% of adults used the internet; by 2000, ~46%. The 1990s were the decade when the internet entered American homes — initially via dial-up modem."

[[fact]]
id = "us-1990s-air-conditioning"
quantity = 68
panel = "diffusion"
label = "Homes with air conditioning, 1993 (RECS)"
value = "68%"
unit = "% of occupied housing units with AC"
source = "eia-recs"
tier = "A"
notes = "RECS 1993: 68% of all occupied housing units had AC. Rose to 87% by 2009 RECS. EIA: 'As recently as 1993, only 68% of all occupied housing units had AC. The latest results from the 2009 RECS show that 87% of U.S. households are now equipped with AC.' (EIA.gov/consumption/residential/reports.php). South region: 89% in 1993 (65% central, 27% room)."

[[fact]]
id = "us-1990s-telephone"
quantity = 94.8
panel = "diffusion"
label = "Housing units with telephone, 1990"
value = "94.8%"
unit = "% of occupied housing units with telephone"
source = "census-hist-housing-phone"
tier = "A"
notes = "1990 Census: 5.2% of housing units without telephone. Down from 7.1% in 1980. By 2000: only 2.4% without telephone. Census notes: 'Increased cell phone usage probably played a major role in this dramatic change.'"

[[fact]]
id = "us-1990s-cell-phone"
panel = "diffusion"
label = "Cell phone subscriptions, 1990s"
value = "2.1 per 100 people (1990) → 12.7 (1995) → 25.1 (1998) → 38.9 (2000)"
unit = "mobile cellular subscriptions per 100 people"
source = "worldbank-itu-telecom"
tier = "A"
notes = "FRED series ITCELSETSP2USA (World Bank/ITU). Subscriptions per 100 people, not household penetration — many households had multiple lines by 2000. CTIA reports similar numbers. Does not equal '% of households with a cell phone' because subscriptions ≠ households. The 2000s room carries '~40% (2000)' from Pew, which measures adult ownership."

[[fact]]
id = "us-1990s-cable-tv"
quantity = 59.3
panel = "diffusion"
label = "Households with cable TV, 1992"
value = "59.3% of TV households (55.2M subscribers)"
unit = "% of U.S. TV households with cable TV subscription"
source = "fcc-video-competition"
tier = "A"
notes = "FCC Fourth Annual Report on Video Competition (FCC 97-423, adopted Dec 1997), Table B-1, p.142: 'Cable Television Industry Growth: 1990-June 1997.' Year-by-year data: 1990: 55.5% (51.7M), 1991: 58.0% (53.4M), 1992: 59.3% (55.2M), 1993: 60.7% (57.2M), 1994: 62.6% (59.7M), 1995: 64.8% (62.1M). Cable penetration crossed 60% in mid-1991 (60.3% per Nielsen, CSMonitor June 1991). TV Household data from A.C. Nielsen via Veronis Suhler; subscriber data from Paul Kagan Associates. Previous source attribution (ncta-cable-history) was incorrect — the NCTA timeline does not contain year-by-year penetration percentages. Verified against local PDF: ~/vitrine-research/09-fcc/fcc97423.pdf."

[[fact]]
id = "us-1990s-computer"
quantity = 36.6
panel = "diffusion"
label = "Households with a computer, 1997 (Census CPS)"
value = "36.6%"
unit = "% of households with a computer"
source = "census-cps-computer"
tier = "A"
notes = "Census Bureau, Current Population Reports P20-522, 'Computer Use in the United States: October 1997' (Sept 1999). 37.4M households (36.6%) had computers in Oct 1997. Historical trend: 8.2% (1984), 15.0% (1989), 22.8% (1993), 36.6% (1997). The 1997 CPS was the first to include Internet questions. NTIA 'Falling Through the Net' reports ~42% computer ownership (1998) and ~51% (2000). Internet access: ~18% of households (1997, NTIA), ~26% (1998), ~41% (2000). Internet figures are widely cited from NTIA/CPS but the exact household-level percentage hasn't been directly transcribed from the primary Census table in this session."

[[fact]]
id = "us-1990s-internet-households"
panel = "diffusion"
label = "Households with internet access, 1997-1998"
value = "~18% (1997) → ~26% (1998)"
unit = "% of households with internet access"
source = "ntia-fttn-2000"
tier = "C"
notes = "NTIA 'Falling Through the Net' series, based on Census CPS supplements (Nov 1994, Oct 1997, Dec 1998, Aug 2000). Internet access was first measured in the 1997 CPS. The 2000s room carries 'Internet: 46% (2000)' from Pew. The Census P20-522 report (Table C) shows 70.9% of adults with a home computer used the Internet somewhere (home/work/school), but this is individual-level use, not household penetration."

[[fact]]
id = "us-1990s-vehicle-ownership"
