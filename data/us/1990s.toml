# US, the 1990s. Primary sources: Census F-8 (income), Census historical housing
# (homeownership, home value, plumbing), CEX (expenditure). RECS, AHS, FRED available.
# Internet diffusion begins (Pew Research from 1995).
# Data year anchors: 1990 (Census), 1990 (F-8).

[room]
country = "us"
decade = "1990s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-median-family-income"
panel = "budget"
label = "Median family income, all families, 1990"
value = "$35,350"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. All families: 66,320 thousand, median $35,350 ($77,260 in 2024 dollars). The 1990s boom would push real incomes up significantly by the end of the decade."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1990s-median-income-four-person"
panel = "budget"
label = "Median family income, four-person families, 1990"
value = "$41,450"
unit = "USD per year, nominal"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. 4-person families: median $41,450 ($90,590 in 2024 dollars). Average family size: 3.18."
assumptions = ["composite-family", "four-person-normalization", "nominal-values"]

[[fact]]
id = "us-1990s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 1990"
value = "66,320,000"
unit = "families"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8."

[[fact]]
id = "us-1990s-average-family-size"
panel = "budget"
label = "Average family size, 1990"
value = "3.18"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Census F-8. Down from 3.27 in 1980. By 2000: 3.14."

[[fact]]
id = "us-1990s-expenditure-shares"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 1996"
value = "Housing 31.3%, transportation 18.7%, food 15.0%, insurance/pensions 10.1%, entertainment 6.0%, healthcare 4.3%, apparel 5.7%, cash contributions 2.1%, education 1.8%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From the 1996 Consumer Expenditure Survey, Table 4 (Size of consumer unit). 15,261 thousand 4-person CUs. Total expenditures: $43,670. Income before taxes: $50,836. Expenditure = 86% of gross income. Housing crossed 31% for the first time. Source: BLS CEX Table 4, 1996 (cusize.pdf via Wayback Machine, web.archive.org)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-1990s-poverty-rate"
panel = "budget"
label = "Official poverty rate, 1990"
value = "13.5% (33.6 million people in poverty)"
unit = "% of all people below official poverty level"
source = "census-poverty-historical"
tier = "A"
notes = "From Census Historical Poverty Tables (API: histpov2). Official poverty rate: 13.5%. Family poverty: 12.0%. The 1990-91 recession pushed poverty up; the 1990s expansion brought it down to 11.3% by 2000."

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-homeownership"
panel = "home"
label = "Homeownership rate, 1990"
value = "64.2%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Roughly flat from 64.4% in 1980. The 1990s would see a sustained rise as the economy boomed."
assumptions = ["composite-family"]

[[fact]]
id = "us-1990s-median-home-value"
panel = "home"
label = "Median value of owner-occupied homes, 1990"
value = "$79,100"
unit = "USD, nominal"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Historical Housing Tables (values-unadj.txt). Up from $47,200 in 1980. By 2000: $119,600."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1990s-plumbing"
panel = "home"
label = "Complete plumbing facilities, 1990"
value = "99% of homes had complete plumbing (1% lacked)"
unit = "% of occupied housing units"
source = "census-hist-housing-plumbing"
tier = "A"
notes = "From Census Historical Housing Tables: Plumbing. Down from ~3% lacking in 1980 to 1% lacking in 1990. Plumbing was essentially universal."

[[fact]]
id = "us-1990s-heating-fuel"
panel = "home"
label = "House heating fuel, 1993 RECS"
value = "Natural gas 53.2%, electricity 25.8%, fuel oil 10.5%, LPG 4.8%"
unit = "% of U.S. households using each fuel as main space heating source (weighted, RECS 1993 microdata)"
source = "eia-recs"
tier = "A"
notes = "Computed from RECS 1993 microdata (file2_asc.txt, FUELHEAT variable, weighted with NWEIGHT). 7,111 households sampled. Gas: 53.2% (up from 55% in 1980 Census — roughly stable). Electricity: 25.8% (up from 18% in 1980). Fuel oil: 10.5% (down from 19% in 1980). LPG: 4.8%. Other (wood, kerosene, etc.): 4.8%. None: 0.9%. The 1990s were a transition decade: fuel oil declining, electricity rising. By 2001: gas 55.2%, electricity 28.9%, fuel oil 7.5%. By 2009: gas 49%, electricity 34%, fuel oil 6%."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 1990"
value = "71.8 male, 78.8 female (75.4 total, all races)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS National Vital Statistics System. Up from 70.0/77.5 in 1980. The 1990s saw further gains from HIV treatment breakthroughs (HAART, 1996) and declining cardiovascular mortality."

[[fact]]
id = "us-1990s-wages"
panel = "day"
label = "Average hourly earnings and weekly hours, 1990"
value = "$10.20/hr, 34.3 hrs/week (total private). Manufacturing: $10.77/hr, 40.5 hrs/week."
unit = "USD/hour and hours/week, nominal"
source = "fred-ahetpi"
tier = "A"
notes = "Production and nonsupervisory employees, seasonally adjusted: FRED AHETPI + AWHNONAG (total private), CES3000000008 + AWHMAN (manufacturing). Annual average of 12 monthly observations, re-verified against FRED 2026-07-08. CAUTION: current CES vintage — the SIC-era published 1990 manufacturing average was $10.83; do not 'correct' back to it."
assumptions = ["nominal-values"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-internet"
panel = "diffusion"
label = "Internet adoption, 1995"
value = "~14% of adults (1995), rising to ~46% by 2000"
unit = "% of adults who use the internet"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center Internet & American Life Project. The World Wide Web went public ~1993-94. By 1995, ~14% of adults used the internet; by 2000, ~46%. The 1990s were the decade when the internet entered American homes — initially via dial-up modem."

[[fact]]
id = "us-1990s-air-conditioning"
panel = "diffusion"
label = "Homes with air conditioning, 1993 (RECS)"
value = "68%"
unit = "% of occupied housing units with AC"
source = "eia-recs"
tier = "A"
notes = "RECS 1993: 68% of all occupied housing units had AC. Rose to 87% by 2009 RECS. EIA: 'As recently as 1993, only 68% of all occupied housing units had AC. The latest results from the 2009 RECS show that 87% of U.S. households are now equipped with AC.' (EIA.gov/consumption/residential/reports.php). South region: 89% in 1993 (65% central, 27% room)."

[[fact]]
id = "us-1990s-telephone"
panel = "diffusion"
label = "Housing units with telephone, 1990"
value = "94.8%"
unit = "% of occupied housing units with telephone"
source = "census-hist-housing-phone"
tier = "A"
notes = "1990 Census: 5.2% of housing units without telephone. Down from 7.1% in 1980. By 2000: only 2.4% without telephone. Census notes: 'Increased cell phone usage probably played a major role in this dramatic change.'"

[[fact]]
id = "us-1990s-cell-phone"
panel = "diffusion"
label = "Cell phone subscriptions, 1990s"
value = "2.1 per 100 people (1990) → 12.7 (1995) → 25.1 (1998) → 38.9 (2000)"
unit = "mobile cellular subscriptions per 100 people"
source = "worldbank-itu-telecom"
tier = "A"
notes = "FRED series ITCELSETSP2USA (World Bank/ITU). Subscriptions per 100 people, not household penetration — many households had multiple lines by 2000. CTIA reports similar numbers. Does not equal '% of households with a cell phone' because subscriptions ≠ households. The 2000s room carries '~40% (2000)' from Pew, which measures adult ownership."

[[fact]]
id = "us-1990s-cable-tv"
panel = "diffusion"
label = "Households with cable TV, 1992"
value = "~60%"
unit = "% of U.S. households with cable TV subscription"
source = "ncta-cable-history"
tier = "C"
notes = "NCTA reports 66.7 million cable customers by 1999. The 60% penetration figure for 1992 is widely cited (Wikipedia, trade publications) but could not be directly verified against the NCTA Cable History Timeline PDF — the timeline does not state a 60% figure for 1992. NCTA does report 50.5% penetration in 1988 and 66.7M customers in 1999. The 60% figure is consistent with the trend between 50.5% (1988) and the late-1990s figures. Tier C: secondary source, penetration figure not directly verified against primary source."

[[fact]]
id = "us-1990s-computer"
panel = "diffusion"
label = "Households with a computer, 1997 (Census CPS)"
value = "36.6%"
unit = "% of households with a computer"
source = "census-cps-computer"
tier = "A"
notes = "Census Bureau, Current Population Reports P20-522, 'Computer Use in the United States: October 1997' (Sept 1999). 37.4M households (36.6%) had computers in Oct 1997. Historical trend: 8.2% (1984), 15.0% (1989), 22.8% (1993), 36.6% (1997). The 1997 CPS was the first to include Internet questions. NTIA 'Falling Through the Net' reports ~42% computer ownership (1998) and ~51% (2000). Internet access: ~18% of households (1997, NTIA), ~26% (1998), ~41% (2000). Internet figures are widely cited from NTIA/CPS but the exact household-level percentage hasn't been directly transcribed from the primary Census table in this session."

[[fact]]
id = "us-1990s-internet-households"
panel = "diffusion"
label = "Households with internet access, 1997-1998"
value = "~18% (1997) → ~26% (1998)"
unit = "% of households with internet access"
source = "ntia-fttn-2000"
tier = "C"
notes = "NTIA 'Falling Through the Net' series, based on Census CPS supplements (Nov 1994, Oct 1997, Dec 1998, Aug 2000). Internet access was first measured in the 1997 CPS. The 2000s room carries 'Internet: 46% (2000)' from Pew. The Census P20-522 report (Table C) shows 70.9% of adults with a home computer used the Internet somewhere (home/work/school), but this is individual-level use, not household penetration."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-food-basket"
panel = "table"
label = "Food basket and expenditure breakdown, 1996 (CEX)"
value = "Food $6,535/yr (15.0% of expenditure). Food at home $4,046 (62% of food), food away from home $2,489 (38%). Key items: meats/poultry/fish/eggs $1,064, cereals/bakery $658, fruits/vegetables $638, dairy $448, beef $319. Total expenditure: $43,670."
unit = "USD per family per year, nominal"
source = "bls-cex"
tier = "A"
notes = "From the 1996 CEX, Table 4. 15,261 thousand 4-person CUs. Food at home share: 62%, food away: 38%. Source: BLS CEX Table 4, 1996 (via Wayback Machine)."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1990s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 1990"
value = "2.24 years ($79,100 home vs $35,350 income)"
unit = "years of median family income (nominal)"
source = "census-homeownership-historical"
tier = "C"
notes = "Computed: 1990 median home value ($79,100) / 1990 median family income ($35,350). Flat from 2.24 in 1980 — both home values and incomes roughly doubled in the 1980s."
assumptions = ["affordability-normalization", "nominal-values"]

[[fact]]
id = "us-1990s-cpi"
panel = "work-buys"
label = "Consumer Price Index and purchasing power, 1990"
value = "CPI 130.7 (1990) → 313.7 (2024) = 2.4x. $1 in 1990 = $2.40 in 2024. Real median family income grew 1.25x."
unit = "CPI-U (1982-84=100), annual average"
source = "bls-cpi"
tier = "A"
notes = "CPI from BLS series CUUR0000SA0 (confirmed via BLS API). 1990: 130.7. 2024: 313.7. Ratio: 2.40x. Nominal median family income: $35,350 (1990) → $105,800 (2024) = 2.99x. Real growth: 2.99/2.40 = 1.25x. Real income growth was slowing — the 1990s-2020s saw the lowest real gains in the century."
assumptions = ["nominal-values", "affordability-normalization"]

[[fact]]
id = "us-1990s-home-production-women"
panel = "day"
label = "Women's weekly unpaid home-production hours, 1990s"
value = "no reliable record"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey (2009) does not report a 1990s benchmark. She explicitly excludes the 1992-94 time use survey ('I do not use the 1992-94 survey because of key missing data such as marital status and the problems with that survey discussed by Robinson and Godbey'). The series jumps from 1985 (28.4 hrs) to 2003 (29.7 hrs). Interpolation would be misleading given the non-monotonic trend. ATUS begins 2003 but measures all adults, not women-specifically."
assumptions = ["composite-family"]

[[fact]]
id = "us-1990s-home-production-men"
panel = "day"
label = "Men's weekly unpaid home-production hours, 1990s"
value = "no reliable record"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "D"
notes = "Ramey (2009) does not report a 1990s benchmark for men (same gap as women: 1992-94 survey excluded). Series jumps from 1985 (13.9 hrs) to 2003 (17.2 hrs)."
assumptions = ["composite-family"]


[[fact]]
id = "us-1990s-food-prices"
panel = "table"
label = "Retail food prices, December 1990"
value = "Bread $0.70/lb, ground beef $2.02/lb, bacon $2.28/lb, eggs $1.00/doz, lettuce $0.58/lb"
unit = "USD, retail prices (December 1990, BLS API)"
source = "bls-api"
tier = "A"
notes = "From BLS API: APU0000702111 (bread, white, pan, per lb), APU0000703111 (ground chuck, per lb), APU0000704111 (bacon, per lb), APU0000708111 (eggs, per doz), APU0000712211 (lettuce, per lb). Values are December 1990 monthly averages. CORRECTION 2026-07-08: previous version had mismatched labels (same error as 2020s room). Food price inflation moderated in the 1980s after the Volcker disinflation. Bread up 35% from 1980 ($0.52→$0.70), ground beef up 9% ($1.86→$2.02)."

[[fact]]
id = "us-1990s-infant-mortality"
panel = "day"
label = "Infant mortality rate, 1990"
value = "9.2 per 1,000 live births"
unit = "deaths under age 1 per 1,000 live births"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS, Health, United States, 2016, Table 11. All races. Neonatal: 5.8; postneonatal: 3.4. The 1990s decline was driven by a 50%+ reduction in SIDS rates (back-to-sleep campaign) and improved survival of low-birthweight infants."
assumptions = ["composite-family"]
