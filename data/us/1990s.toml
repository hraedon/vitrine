tier = "A"
notes = "From Census C-25 annual report (c25ann-2003.pdf), 'Presence of Air-Conditioning in New One-Family Houses Completed.' AC in new homes: 1973: 40%, 1980: 52%, 1990: 56%, 1995: 72%, 2000: 81%, 2003: 82%. New homes crossed 50% AC in 1980. By 2000, AC was standard in 81% of new homes. Distinct from RECS data on all housing units (68% in 1993)."
assumptions = ["composite-family"]

[[fact]]
id = "us-1990s-mvpd-subscribers"
quantity = 64.2
panel = "diffusion"
label = "Cable TV subscribers, 1997"
value = "64.2 million cable subscribers (87% of MVPD market)"
