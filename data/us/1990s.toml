tier = "A"
notes = "From BTS Figure 2-7 (Census Bureau decennial census, 1990). 11.5% had no vehicle, 33.8% had one, 37.4% had two, 17.3% had three or more. Two-vehicle households (37.4%) now exceeded one-vehicle households (33.8%) — car dependency peaked. By 2000: 89.7%. Population: all occupied housing units."

[[fact]]
id = "us-1990s-new-home-ac"
