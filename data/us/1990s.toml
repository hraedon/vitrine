source = "fred-ahetpi"
tier = "A"
notes = "Computed: hourly earnings ($10.20) × weekly hours (34.3) = $349.86/week (total private production/nonsupervisory, FRED AHETPI + AWHNONAG). × 52 = $18,193, which is 51.5% of the all-family median income ($35,350, Census F-8). Below half — a single wage-earner now covers barely half the median family income. Compare 1980: 60%, 2000: 49%."
assumptions = ["composite-family", "nominal-values"]

