tier = "D"
notes = "The 1902 Sears, Roebuck catalog (1,200 pages) is available on Internet Archive and includes prices for household items, clothing, tools, and more. The Missouri guide links to it. Prices not transcribed in this session — the catalog is a primary source for mail-order retail prices. Access: https://archive.org/details/sears-roebuck-catalog-104-spring-1897 (1897 catalog) and Missouri guide links to later editions."
assumptions = ["nominal-values"]

