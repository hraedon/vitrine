[[fact]]
id = "us-1900s-homeownership-gap"
panel = "home"
label = "Homeownership rate, 1900s"
value = "no reliable record"
unit = "—"
source = "census-homeownership-historical"
tier = "D"
notes = "The Census homeownership time series starts in 1900. The 1900 rate was approximately 46.5% nationally (from owner.pdf), but this is for all households, not just the wage-earner families surveyed by the Commissioner of Labor. The wage-earner population in the 1903 survey was overwhelmingly urban renters."
assumptions = ["composite-family", "urban-rural-split"]

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-food-basket-gap"
panel = "table"
label = "Food basket composition, ~1903"
value = "no reliable record accessible online"
unit = "—"
source = "commissioner-labor-18th-1903"
tier = "D"
notes = "The 1903 report includes detailed food expenditure data (what families bought and ate), but the primary source is on FRASER and not accessible from this host. Food was 42% of expenditure — the basket would include bread, meat, potatoes, coffee, sugar, milk. Sears catalogs from the era (available on Internet Archive) list food prices but are mail-order, not retail."
assumptions = ["income-vs-consumption"]

[[fact]]
id = "us-1900s-sears-catalog-prices"
panel = "table"
