# US, the 1900s. Upgraded to Tier A — data from BLS Bulletin No. 49 (1903).
# Primary source: 18th Annual Report of the Commissioner of Labor.
# Data year: 1901. 2,567 wage-earner families in 33 states.

[room]
country = "us"
decade = "1900s"
wage_anchor = "us-1900s-mens-weekly-wages"
income_anchor = "us-1900s-annual-family-income"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-annual-family-income"
quantity = 827.19
panel = "budget"
label = "Average annual family income, 1901"
value = "$827.19"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
amount_minor = 82719
currency = "USD"
price_year = 1901
basis = "annual"
notes = "From BLS Bulletin No. 49, p.1138. This is an AVERAGE, not a median — the report did not compute medians. Population: 2,567 wage-earner families in 33 states, head earning ≤$1,200/year. NOTE: the University of Missouri guide cited this as $749 — the primary source says $827.19. The Missouri figure was wrong."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption", "affordability-normalization"]

[[fact]]
id = "us-1900s-survey-income-cap"
quantity = 1200
panel = "budget"
label = "Survey income ceiling, 1901"
value = "$1,200"
unit = "USD per year — families earning more were excluded"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138: 'the head of the family must be a wage worker or a salaried man earning not over $1,200 during the year.' This caps the survey at the lower/middle income range — upper-income families are not represented."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-average-expenditure"
quantity = 768.54
panel = "budget"
label = "Average annual family expenditure, 1901"
value = "$768.54"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. Average expenditure for all purposes. Families spent 93% of their income on average ($768.54 / $827.19), leaving a small surplus."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption"]

[[fact]]
id = "us-1900s-food-share"
quantity = 42.54
panel = "budget"
label = "Food as share of family expenditure, 1901"
value = "42.54%"
unit = "share of total expenditure ($326.90 of $768.54)"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138: '$326.90 per family, or 42.54 per cent of the average expenditure for all purposes.' Food was the largest expenditure category. By comparison, food is under 15% of expenditure in the 2020s."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-expenditure-breakdown"
quantity = 42.54
panel = "budget"
label = "Full expenditure breakdown, 1901"
value = "Food 42.54%, rent 12.95%, clothing 14.04%, fuel & light 5.25%, furniture 3.42%, tobacco 1.42%, liquor/sickness/amusements 14.51%, misc 5.87%"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, pp.1140-1141. Rent was 12.95% — the Missouri guide cited 13%, which matches. The report notes that no retail prices were available for rent, clothing, fuel, furniture, or tobacco for the time series (only food had retail price data)."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-family-size"
quantity = 5.31
panel = "budget"
label = "Average family size, 1901"
value = "5.31"
unit = "persons per family"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. 0.7 persons above the Census 1900 national average of 4.61. The report notes this was not due to intentional selection of larger families."
assumptions = ["composite-family"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-rent-share"
quantity = 12.95
panel = "home"
label = "Rent as share of expenditure, 1901"
value = "12.95%"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1140. The report notes no retail prices were available for rent across years, so rent is reported as a share but not as a dollar amount."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-housing-rooms-rent"
panel = "home"
label = "Housing: rooms, rent, and tenure, 1901"
value = "Renting: 4.73 rooms/family, $24.60/room/yr avg rent. Owning: 5.92 rooms/family. Rent was 12.95% of expenditure."
unit = "rooms per family; USD per room per year"
source = "commissioner-labor-18th-1903"
tier = "A"
notes = "From the 18th Annual Report, Table III-K (p.370-371), OCR'd via GLM-OCR. Summary of families renting and owning homes by state and nativity. National narrative (p.73): families owning homes averaged 5.92 rooms vs 4.73 for renters; 1.16 rooms per individual (owners) vs 1.01 (renters). Average cost of rent per room was ~$24.60/yr ($24.66 native, $24.55 foreign). The survey covered 2,567 normal families in 33 states; families with boarders excluded from the housing table."
assumptions = ["composite-family", "urban-rural-split"]

[[fact]]
id = "us-1900s-homeownership-gap"
quantity = 46.5
panel = "home"
label = "Homeownership rate, 1900s"
value = "~46.5% (national, all households)"
unit = "% of occupied housing units owner-occupied"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census homeownership time series (owner.pdf). National rate ~1900. This is for ALL households, not just the wage-earner families surveyed by the Commissioner of Labor — those families were overwhelmingly urban renters."
assumptions = ["composite-family", "urban-rural-split"]

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-food-expenditure"
panel = "table"
label = "Average annual food expenditure, 1901"
value = "$326.90"
unit = "USD per family per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. This is the total food expenditure per family per year — $6.29 per week. The report also collected retail prices for staple foods from 814 retail merchants in the same localities."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-food-basket"
panel = "table"
label = "Food basket: expenditure per family by item, 1901"
value = "Beef (fresh) $46.38, beef (salt) $10.61, hog (fresh) $15.64, hog (salt) $17.60, other meat $13.29, poultry $9.91, fish $8.35, eggs $16.17, milk $20.03, butter $27.73"
unit = "USD per family per year, nominal (avg among families buying each item)"
source = "commissioner-labor-18th-1903"
tier = "A"
notes = "From the 18th Annual Report, Table IV-M (p.499), OCR'd via GLM-OCR. Summary of expenditure per family for various items of food, by nativity of head of family. National totals for 1,578 families. These 10 categories total $185.71 — 56.8% of the $326.90 total food expenditure. The remainder covers flour, bread, vegetables, fruits, sugar, coffee, etc. Beef (fresh) was the single largest food expenditure at $46.38. Butter ($27.73) exceeded milk ($20.03) — reflecting the era's dietary patterns."
assumptions = ["composite-family", "nominal-values"]

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-weekly-hours"
quantity = 59
panel = "day"
label = "Average weekly hours, manufacturing, 1900"
value = "59.0"
unit = "hours per week"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics of the United States (Colonial Times to 1970), Series D 765, p.76 (OCR'd via GLM-OCR). Total manufacturing, all workers. Union workers averaged 53.0 hrs; payroll workers 62.1 hrs. By 1910, hours had fallen to 56.6. The previous Tier D figure of '56' from the Missouri guide was close but unsourced."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-mens-weekly-wages"
panel = "day"
label = "Average hourly earnings, manufacturing, 1908"
value = "$0.250/hour ($14.20/week at 56.8 hrs)"
unit = "USD per hour, nominal"
source = "hist-stats-wages-manufacturing"
tier = "A"
amount_minor = 25
currency = "USD"
price_year = 1908
basis = "hourly"
notes = "From Historical Statistics of the United States, Series D 766 (hourly earnings). The anchor year is 1908 ($0.250/hr = 25 cents, exact) because the 1900 figure ($0.216/hr) is not representable in integer cents — per Plan 013 D2, the anchor picks the in-decade year whose published figure lands on a cent boundary. Weekly earnings: $0.250 x 56.8 hrs = $14.20. The 1900 figure ($0.216, 59.0 hrs, $12.74/wk) is the decade's start; 1908 is mid-decade. The 8-year gap to the income anchor (1900-01) is flagged by the affordability comparator."
assumptions = ["nominal-values", "manufacturing-wage-proxy"]

[[fact]]
id = "us-1900s-womens-weekly-wages"
panel = "day"
label = "Average weekly earnings, wage-earning women, 1905"
value = "$6.17"
unit = "USD per week, nominal"
source = "census-manufactures-1905"
tier = "A"
notes = "From the 1905 Census of Manufactures, Part I, page lxxxix. Women earned $6.17/week vs men's $11.16/week — a 55% gap. Women's earnings were $4.17 above the minimum and $4.90 below the maximum. Confirmed by Hutchinson, 'Women's Wages' (archive.org) and Missouri Prices & Wages guide. Upgraded from Tier D to Tier A: figure is from an official Census Bureau statistical series."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1900s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 1900-02"
value = "48.2 years (white male), 51.1 years (white female)"
unit = "years at birth"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics of the United States, Series B 116-117 (Expectation of Life at Specified Ages), p.76 (OCR'd via GLM-OCR). Period 1900-02. At age 20: male 42.2, female 43.8. At age 40: male 27.7, female 29.2. By 1909-11: male 50.2, female 53.6. The previous Tier D figure of '48 years' from the Missouri guide was accurate."
assumptions = []

[[fact]]
id = "us-1900s-infant-mortality"
quantity = 100
panel = "day"
label = "Infant mortality rate, 1900"
value = "~100 per 1,000 live births"
unit = "deaths before age 1 per 1,000 live births"
source = "cdc-mmwr-infant-mortality"
tier = "A"
notes = "From CDC MMWR Vol. 48, No. 38 (1999): 'approximately 100 infants died before age 1 year' per 1,000 live births at the beginning of the 20th century. In some U.S. cities, up to 30% of infants died before reaching their first birthday. The 1915 rate (first year of reliable national data) was 99.9 per 1,000. By 1997: 7.2 per 1,000 — a >90% decline. This is one of the great public health achievements of the 20th century: sanitation, milk pasteurization, antibiotics, and neonatal intensive care."

# ── Diffusion panel ────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-diffusion"
quantity = 5
panel = "diffusion"
label = "Technology diffusion: telephone, automobile, electricity (~1900)"
value = "Telephone: 9.2 per 1,000 population (1898), ~5% of households. Automobile: <1% (registration incomplete pre-1910). Electricity: <5% of homes (urban only). Radio: not yet commercial."
unit = "per 1,000 population or % of households"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics Vol 2, Series R 1-2 (p.192, OCR'd via GLM-OCR): 1898 had 681,000 telephones = 9.2 per 1,000 population. With avg family size 5.31, this translates to roughly 5% of households. The report notes motor-vehicle registration data for early years is 'incomplete, largely because few States required their registration' (p.113). By 1907, telephone penetration reached ~7% of households. Electricity diffusion was limited to urban areas; rural electrification didn't begin until the 1930s. Radio broadcasting began ~1920."
assumptions = ["composite-family", "urban-rural-split"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-weekly-earnings-context"
panel = "work-buys"
label = "What a week of work bought, 1900"
value = "$12.74/week (manufacturing) = 1.66% of $768.54 annual expenditure → 60 weeks of one earner's wages; the family budget depended on income beyond this one manufacturing wage"
unit = "ratio of weekly wages to annual expenditure"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "Computed from primary sources: hourly earnings $0.216 × 59.0 hrs = $12.74/week (Historical Statistics Series D 765-766). Annual expenditure $768.54 from the 18th Annual Report (Bulletin No. 49, p.1138). $12.74 covers 1.66% of annual expenditure — implying ~60 weeks of work to cover expenses, consistent with year-round work by multiple family earners. Previous Tier D used $11.00/week from the Missouri guide."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-surplus"
panel = "work-buys"
label = "Income vs expenditure surplus, 1901"
value = "$58.65 surplus ($827.19 income - $768.54 expenditure)"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "Computed from primary source: average income ($827.19) minus average expenditure ($768.54) = $58.65. Families saved about 7% of income on average. This is a thin margin — sickness or unemployment could quickly push a family into deficit."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-car-price"
panel = "work-buys"
label = "New automobile price, 1901–1904"
value = "$650 (Oldsmobile Curved Dash, best-selling) to $750 (Ford Model A)"
unit = "USD, nominal (manufacturer list price)"
source = "early-auto-prices"
tier = "C"
amount_minor = 65000
currency = "USD"
price_year = 1901
basis = "total"
notes = "The Oldsmobile Curved Dash Runabout was $650 from 1901–1904 and was the best-selling car in America (425 sold 1901, 2,500 in 1902, 3,924 in 1903). The Ford Model A (first Ford, 1903) was $750–$850. The Rambler was also $650. These are manufacturer list prices from primary company records, compiled by automotive historians. The previous Tier D figure ($750–$1,500 from Frank Leslie's Popular Monthly) is consistent but less precise. A $650 car = 51 weeks of manufacturing wages ($12.74/week) = ~80% of annual family income ($827.19)."
assumptions = ["nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-1900s-home-production-women"
quantity = 46.8
panel = "day"
label = "Women's weekly unpaid home-production hours, 1900"
value = "46.8"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-home-production-men"
quantity = 3.9
panel = "day"
label = "Men's weekly unpaid home-production hours, 1900"
value = "3.9"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]


[[fact]]
id = "us-1900s-home-production-household"
quantity = 78
panel = "day"
label = "Total home-production hours per household, 1900"
value = "78"
unit = "hours per week, all household members combined"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009), aggregate home-production hours divided by number of households. Fell from 78 hrs/week (1900) to 49 hrs/week (2005), a 37% decline. Household size fell 45% (4.7→2.6 persons) over the same period, so per-household hours fell proportionally less than household size. Per-capita (all ages) was 16.4 hrs/week — slightly higher in 2005 than 1900 because fewer children (who do little home production) are in the population."
assumptions = ["composite-family"]
