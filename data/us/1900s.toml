# US, the 1900s. Tier C/D room — the Commissioner of Labor era.
# Most facts are Tier D (secondary sources citing the 1903 report).
# The primary source (18th Annual Report) is on FRASER but not accessible
# from this curation host — all facts note this honestly.

[room]
country = "us"
decade = "1900s"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-annual-family-income"
panel = "budget"
label = "Average annual family income, ~1903"
value = "$749"
unit = "USD per year, nominal"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the University of Missouri Prices and Wages guide (1900-1909 page), citing the 18th Annual Report of the Commissioner of Labor (1903). This is an AVERAGE, not a median — the survey did not compute medians. The survey excluded families earning over $1,200/year. Population: wage-earner families in selected industrial centers, 33 states — NOT a national median. Tier D: figure transcribed from a secondary source (Missouri guide), not directly from the primary source (FRASER)."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption"]

[[fact]]
id = "us-1900s-survey-income-cap"
panel = "budget"
label = "Survey income ceiling, 1903"
value = "$1,200"
unit = "USD per year — families earning more were excluded"
source = "umizzou-prices-wages"
tier = "D"
notes = "The 1903 Commissioner of Labor survey explicitly excluded families earning over $1,200/year. This means the survey captures the lower and middle of the income distribution but misses upper-income families. The $749 average is from this capped sample."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-food-share"
panel = "budget"
label = "Food as share of family expenditure, ~1903"
value = "42%"
unit = "share of total family expenditure"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing the 1903 Commissioner of Labor report. Food was the largest expenditure category for working-class families. Population: working-class families in the 1903 survey. Tier D: not transcribed from primary source."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-rent-share"
panel = "budget"
label = "Rent as share of family expenditure, ~1903"
value = "13%"
unit = "share of total family expenditure"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing the 1903 Commissioner of Labor report. Rent was the second-largest expenditure after food. In Boston, the share was higher (~25%) according to a 1901 Congressional report cited by the same guide."
assumptions = ["composite-family", "income-vs-consumption"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-housing-gap"
panel = "home"
label = "Housing tenure, rooms, amenities"
value = "no reliable record accessible online"
unit = "—"
source = "commissioner-labor-18th-1903"
tier = "D"
notes = "The 1903 Commissioner of Labor report includes housing data (rent, rooms, amenities) for surveyed families, but the report is on FRASER (https://fraser.stlouisfed.org/title/annual-report-commissioner-labor-6306/eighteenth-annual-report-commissioner-labor-608452) and could not be accessed from this host. No Census of Housing existed until 1940. Gap: primary source exists but not accessible."
