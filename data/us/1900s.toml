# ── Diffusion panel ────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-diffusion-gap"
panel = "diffusion"
label = "Technology diffusion (electricity, telephone, automobile, radio)"
value = "no reliable record"
unit = "—"
source = "hist-stats-colonial-1970"
tier = "D"
notes = "No decennial census asked about technology ownership until 1930 (radio). Historical Statistics of the United States (Colonial Times to 1970, free on Internet Archive) has aggregate diffusion series for electricity, telephone, and automobile adoption. These are national aggregates, not family-level. The 1900s saw <5% of households with electricity, <5% with telephones, and <1% with automobiles. Specific percentages need to be transcribed from Historical Statistics."
assumptions = ["composite-family"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-weekly-earnings-context"
panel = "work-buys"
label = "What a week of work bought, ~1905"
value = "$11.00/week (men) = 1.5% of annual family income"
unit = "weekly earnings as % of annual family income"
source = "umizzou-prices-wages"
tier = "D"
notes = "Computed: men's weekly wages ($11.00) divided by annual family income ($749). A week of wages bought about 1.5% of annual family income. This implies ~68 weeks of work to earn the annual family income — consistent with multiple earners or longer hours. Tier D because both numerator and denominator are Tier D."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-purchasing-power-gap"
panel = "work-buys"
label = "Purchasing power comparison to 2024"
value = "no reliable record"
unit = "—"
source = "measuringworth"
tier = "D"
notes = "MeasuringWorth.com provides calculators for the relative value of money over time. The CPI series starts in 1913, so 1900-1912 values require the CPI research series or the broader wage/GDP series. MeasuringWorth is accessible at https://www.measuringworth.com/ but specific calculations not performed in this session."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1900s-new-car-price"
panel = "work-buys"
label = "New automobile price, 1904"
value = "$750–$1,500"
unit = "USD, nominal (typical range)"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing Frank Leslie's Popular Monthly (1904) and Handbook of Gasoline Automobiles. A typical automobile cost $750 in 1904. At $11/week, this represents ~68 weeks of a man's wages. Tier D: transcribed from secondary source; the primary source is a period magazine/catalog."
assumptions = ["nominal-values"]
