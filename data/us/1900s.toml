# US, the 1900s. Upgraded to Tier A — data from BLS Bulletin No. 49 (1903).
# Primary source: 18th Annual Report of the Commissioner of Labor.
# Data year: 1901. 2,567 wage-earner families in 33 states.

[room]
country = "us"
decade = "1900s"
income_anchor = "us-1900s-annual-family-income"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-annual-family-income"
panel = "budget"
label = "Average annual family income, 1901"
value = "$827.19"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
amount_minor = 82719
currency = "USD"
price_year = 1901
basis = "annual"
notes = "From BLS Bulletin No. 49, p.1138. This is an AVERAGE, not a median — the report did not compute medians. Population: 2,567 wage-earner families in 33 states, head earning ≤$1,200/year. NOTE: the University of Missouri guide cited this as $749 — the primary source says $827.19. The Missouri figure was wrong."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption", "affordability-normalization"]

[[fact]]
id = "us-1900s-survey-income-cap"
panel = "budget"
label = "Survey income ceiling, 1901"
value = "$1,200"
unit = "USD per year — families earning more were excluded"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138: 'the head of the family must be a wage worker or a salaried man earning not over $1,200 during the year.' This caps the survey at the lower/middle income range — upper-income families are not represented."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-average-expenditure"
panel = "budget"
label = "Average annual family expenditure, 1901"
value = "$768.54"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. Average expenditure for all purposes. Families spent 93% of their income on average ($768.54 / $827.19), leaving a small surplus."
assumptions = ["composite-family", "nominal-values", "income-vs-consumption"]

[[fact]]
id = "us-1900s-food-share"
panel = "budget"
label = "Food as share of family expenditure, 1901"
value = "42.54%"
unit = "share of total expenditure ($326.90 of $768.54)"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138: '$326.90 per family, or 42.54 per cent of the average expenditure for all purposes.' Food was the largest expenditure category. By comparison, food is under 15% of expenditure in the 2020s."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-expenditure-breakdown"
panel = "budget"
label = "Full expenditure breakdown, 1901"
value = "Food 42.54%, rent 12.95%, clothing 14.04%, fuel & light 5.25%, furniture 3.42%, tobacco 1.42%, liquor/sickness/amusements 14.51%, misc 5.87%"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, pp.1140-1141. Rent was 12.95% — the Missouri guide cited 13%, which matches. The report notes that no retail prices were available for rent, clothing, fuel, furniture, or tobacco for the time series (only food had retail price data)."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-family-size"
panel = "budget"
label = "Average family size, 1901"
value = "5.31"
unit = "persons per family"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. 0.7 persons above the Census 1900 national average of 4.61. The report notes this was not due to intentional selection of larger families."
assumptions = ["composite-family"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-rent-share"
panel = "home"
label = "Rent as share of expenditure, 1901"
value = "12.95%"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1140. The report notes no retail prices were available for rent across years, so rent is reported as a share but not as a dollar amount."
assumptions = ["composite-family", "income-vs-consumption"]

[[fact]]
id = "us-1900s-housing-gap"
panel = "home"
label = "Housing tenure, rooms, amenities"
value = "data in report — not yet transcribed"
unit = "—"
source = "bls-bulletin-49-1903"
tier = "D"
notes = "The 268-page report likely contains housing data (rent amounts, rooms) for the surveyed families, but only the summary table (p.1138) and expenditure breakdown (pp.1140-1141) have been transcribed so far. No Census of Housing existed until 1940."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-homeownership-gap"
panel = "home"
label = "Homeownership rate, 1900s"
value = "~46.5% (national, all households)"
unit = "% of occupied housing units owner-occupied"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census homeownership time series (owner.pdf). National rate ~1900. This is for ALL households, not just the wage-earner families surveyed by the Commissioner of Labor — those families were overwhelmingly urban renters."
assumptions = ["composite-family", "urban-rural-split"]

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-food-expenditure"
panel = "table"
label = "Average annual food expenditure, 1901"
value = "$326.90"
unit = "USD per family per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "From BLS Bulletin No. 49, p.1138. This is the total food expenditure per family per year — $6.29 per week. The report also collected retail prices for staple foods from 814 retail merchants in the same localities."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-food-prices-gap"
panel = "table"
label = "Retail food prices, 1901"
value = "data in report — not yet transcribed"
unit = "—"
source = "bls-bulletin-49-1903"
tier = "D"
notes = "The report collected retail prices for staple articles of food from 814 retail merchants in the same localities as the family expenditure survey. Items include flour, beef, milk, butter, eggs, potatoes, sugar, coffee, rice. Prices cover 1890-1902. The table exists in the PDF but prices are in columns that pdftotext doesn't align well — may need OCR at higher resolution or manual transcription."
assumptions = ["nominal-values"]

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-weekly-hours"
panel = "day"
label = "Average weekly hours, non-farm employees, 1900"
value = "56"
unit = "hours per week"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing BLS Staff Paper #2. Average across all non-farm employees. This figure is still Tier D — the primary source (BLS Staff Paper) was not accessed directly. The 1903 report itself may contain work hours data for the surveyed families."
assumptions = ["composite-family"]

[[fact]]
id = "us-1900s-mens-weekly-wages"
panel = "day"
label = "Average weekly earnings, wage-earning men, 1905"
value = "$11.00"
unit = "USD per week, nominal"
source = "umizzou-prices-wages"
tier = "D"
amount_minor = 1100
currency = "USD"
price_year = 1905
basis = "weekly"
notes = "From the Missouri guide citing 1905 Census of Manufactures. Population: male wage-earners in manufacturing. Average, not median. Still Tier D — not transcribed from primary source."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1900s-womens-weekly-wages"
panel = "day"
label = "Average weekly earnings, wage-earning women, 1905"
value = "$6.17"
unit = "USD per week, nominal"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing 1905 Census of Manufactures. Women earned ~56% of men's average. Still Tier D."
assumptions = ["nominal-values"]

[[fact]]
id = "us-1900s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, ~1900"
value = "48 years"
unit = "years"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing BLS. Context for the era. Still Tier D."
assumptions = []

# ── Diffusion panel ────────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-diffusion-gap"
panel = "diffusion"
label = "Technology diffusion (electricity, telephone, automobile, radio)"
value = "no reliable record"
unit = "—"
source = "hist-stats-colonial-1970"
tier = "D"
notes = "No decennial census asked about technology ownership until 1930 (radio). Historical Statistics of the United States (Colonial Times to 1970, free on Internet Archive) has aggregate diffusion series for electricity, telephone, and automobile adoption. These are national aggregates, not family-level. The 1900s saw <5% of households with electricity, <5% with telephones, and <1% with automobiles."
assumptions = ["composite-family"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1900s-weekly-earnings-context"
panel = "work-buys"
label = "What a week of work bought, ~1905"
value = "$11.00/week (men) = 0.69 weeks per $768.54 annual expenditure"
unit = "ratio of weekly wages to annual expenditure"
source = "umizzou-prices-wages"
tier = "D"
notes = "Computed: men's weekly wages ($11.00) divided by average annual expenditure ($768.54 from the 1903 report). A man's weekly wages covered about 1.4% of annual family expenditure — implying ~70 weeks of work to cover annual expenses, consistent with multiple earners or year-round work. Tier D because the wage figure is from the Missouri guide."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-surplus"
panel = "work-buys"
label = "Income vs expenditure surplus, 1901"
value = "$58.65 surplus ($827.19 income - $768.54 expenditure)"
unit = "USD per year, nominal"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "Computed from primary source: average income ($827.19) minus average expenditure ($768.54) = $58.65. Families saved about 7% of income on average. This is a thin margin — sickness or unemployment could quickly push a family into deficit."
assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-1900s-new-car-price"
panel = "work-buys"
label = "New automobile price, 1904"
value = "$750–$1,500"
unit = "USD, nominal (typical range)"
source = "umizzou-prices-wages"
tier = "D"
notes = "From the Missouri guide citing Frank Leslie's Popular Monthly (1904) and Handbook of Gasoline Automobiles. A $750 automobile = 68 weeks of a man's wages ($11/week) = ~91% of annual family income. Tier D."
assumptions = ["nominal-values"]
