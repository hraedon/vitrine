# US, the 1910s. Primary sources: Census historical homeownership, Historical
# Statistics Vol 1 (life expectancy, manufacturing wages). No income survey
# exists (CPS/F-8 begins 1947). No Census of Housing until 1940.
# Data year anchors: 1910 (Census), 1909-11 (life expectancy).

[room]
country = "us"
decade = "1910s"
wage_anchor = "us-1910s-manufacturing-wages"

# ── Budget panel ──────────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-income-gap"
panel = "budget"
label = "Median family income, 1910s"
value = "no reliable record accessible online"
unit = "n/a"
source = "census-hist-income-families"
tier = "D"
notes = "No national income survey existed before 1947. The Census of Manufactures collected wage data but not family income. The first CPS income question was 1945 (P-60 No. 1). For 1910, the best available proxy is manufacturing wages: $0.260/hr, ~56.6 hrs/week (Historical Statistics Vol 1, Series D 765). See day panel."

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-homeownership"
quantity = 45.9
panel = "home"
label = "Homeownership rate, 1910"
value = "45.9%"
unit = "% of occupied dwelling units (owner-occupied)"
source = "census-homeownership-historical"
tier = "A"
notes = "From Census Bureau decennial time series (owner.pdf). Down from 46.7% in 1900 — the long slow decline from 1900 to 1920. By 1920: 45.6%."
assumptions = ["composite-family"]

[[fact]]
id = "us-1910s-housing-gap"
panel = "home"
label = "Home value, rooms, plumbing, electricity"
value = "no reliable record accessible online"
unit = "n/a"
source = "census-decennial-pubs"
tier = "D"
notes = "The 1910 Census did not collect housing characteristics. The first Census of Housing was 1940. Most urban homes in the 1910s had electricity (~85% of urban/non-farm by 1920); rural homes were almost entirely unelectrified (~2% of farms in 1910). Indoor plumbing was available in cities but rare in rural areas."

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 1909-11"
value = "50.2 male, 53.6 female (white)"
unit = "years"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics Vol 1, Series B 116-117 (white population, at birth). The 1910s were devastated by the 1918-19 influenza pandemic, which killed ~675,000 Americans and temporarily reduced life expectancy by ~12 years. Pre-pandemic baseline: 50.2 male, 53.6 female."

[[fact]]
id = "us-1910s-manufacturing-wages"
panel = "day"
label = "Manufacturing production worker wages, 1910"
value = "$0.260/hr, 56.6 hrs/week, ~$14.72/wk"
unit = "USD, nominal (hourly earnings, weekly hours, implied weekly earnings)"
source = "hist-stats-wages-manufacturing"
tier = "A"
amount_minor = 26
currency = "USD"
price_year = 1910
basis = "hourly"
notes = "From Historical Statistics Vol 1, Series D 765-767 (manufacturing production workers). Hourly: $0.260 (26 cents, exact), weekly hours: 56.6, implied weekly earnings: $14.72. By 1915: $0.287/hr, 55.0 hrs/week. These are the pre-WWI wage levels; wartime demand would push wages up sharply by 1917-18."
assumptions = ["nominal-values", "manufacturing-wage-proxy"]

# ── Diffusion panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-telephone"
panel = "diffusion"
label = "Telephone diffusion, 1910s"
value = "~13 per 1,000 population (1915)"
unit = "telephones per 1,000 population"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics Vol 2, Series R 1-2. In 1915: ~13 per 1,000 population (~5.5 million total phones). Household percentage not directly reported until 1944, but estimated at well under 10% of households. The Bell System was expanding but telephone remained a business and upper-class amenity."

[[fact]]
id = "us-1910s-electricity-gap"
panel = "diffusion"
label = "Electricity, radio, automobile"
value = "Electricity ~5-10% of homes (urban only). Radio not yet commercial. Automobile <2%."
unit = "n/a"
source = "hist-stats-colonial-1970"
tier = "C"
notes = "Historical Statistics does not track household electrification directly until the 1940 Census. Urban electrification was growing rapidly (Edison's Pearl Street station opened 1882); by 1910, most city homes had electric lighting. Rural homes were almost entirely unelectrified. Commercial radio broadcasting began 1920 (KDKA Pittsburgh). Automobile registrations were growing but still under 2% of households."

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-food-basket-gap"
panel = "table"
label = "The food basket, 1910s"
value = "no reliable record accessible online"
unit = "n/a"
source = "bls-bulletin-49-1903"
tier = "D"
notes = "The BLS Bulletin No. 49 (1903) and 18th Annual Report (1903) cover the 1900s. No comparable survey exists for the 1910s. The next major consumer expenditure survey would be the 1918-19 study, conducted during wartime."

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-1910s-work-buys-gap"
panel = "work-buys"
label = "Affordability comparisons, 1910s"
value = "no reliable record accessible online"
unit = "n/a"
source = "hist-stats-colonial-1970"
tier = "D"
notes = "Without a median family income figure, affordability comparisons cannot be computed. Manufacturing wages ($0.26/hr, ~$765/yr) provide a wage anchor, but without expenditure data, the purchasing-power comparison is incomplete."

[[fact]]
id = "us-1910s-car-price"
panel = "work-buys"
label = "Average new car price, 1910"
value = "~$1,188 (average wholesale, computed from factory sales)"
unit = "USD, nominal (wholesale value per passenger car)"
source = "hist-stats-colonial-1970"
tier = "A"
amount_minor = 118800
currency = "USD"
price_year = 1910
basis = "total"
notes = "Computed from Historical Statistics of the United States, Colonial Times to 1970, Part 2, p.716, Series Q 148-162 (source: Automobile Manufacturers Association, Automobile Facts and Figures, 27th ed., 1946-47). 1910: 181,000 passenger cars sold at $215 million wholesale value = ~$1,188 average per car. This is wholesale (factory) value; retail/transaction price would be higher (dealer markup). The source notes 'beginning 1937, standard equipment is included in the value estimate.' Population: all US factory sales of passenger cars."
assumptions = ["nominal-values"]


# ── Home production hours (Ramey 2009) ─────────────────────────────────────
# Plan 005 WI-2: women's + men's weekly unpaid home-production hours.
# Source: Ramey (2009), Table 6A (women) & Table 7 (men), "All Prime-Age" cols.
# Population: ages 18–64, weighted by employment-population ratio.
# Tier C: reconstruction from period time-diary studies linked to modern surveys.
# Note: actor/hours_kind fields pending Plan 005 WI-1 model changes.

[[fact]]
id = "us-1910s-home-production-women"
quantity = 45.6
panel = "day"
label = "Women's weekly unpaid home-production hours, 1910"
value = "45.6"
unit = "hours per week, prime-age women (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 6A, 'All Prime-Age Women' column. Reconstruction from historical time-diary studies (Purnell Act 1920s, Wilson 1929, USDA 1944) linked to AHTUS/BLS surveys from 1965. Includes food prep, house cleaning, clothing care, childcare, purchasing, and household management. Numbers in italics in source = partially extrapolated. Draft version (NBER w13985) has identical values. Splice caveat: Ramey measures women-specific home production ages 18-64; ATUS (2020s room) measures all-adult household activities age 15+ — a concept change that must caveat when plotted together."
assumptions = ["composite-family"]

[[fact]]
id = "us-1910s-home-production-men"
quantity = 4
panel = "day"
label = "Men's weekly unpaid home-production hours, 1910"
value = "4.0"
unit = "hours per week, prime-age men (ages 18–64)"
source = "ramey-2009"
tier = "C"
notes = "Ramey (2009) Table 7, 'All Prime-Age Men' column. Early estimates from Purnell Act studies and Lundberg et al. (1934); 1965+ from AHTUS/BLS. Men's hours rose 13 hrs/week across the century (3.9→16.8), partially offsetting women's decline. Numbers in italics in source = partially extrapolated."
assumptions = ["composite-family"]

# ── Married women's labor force participation ─────────────────────────────

[[fact]]
id = "us-1910s-married-women-lfpr"
quantity = 10.7
panel = "day"
label = "Married women's labor force participation, 1910"
value = "~10.7%"
unit = "% of married women (husband present) in the civilian labor force"
source = "hist-stats-colonial-1970"
tier = "A"
notes = "From Historical Statistics Vol 1, Series D 49-62. The 1910 census recorded ~10.7% — nearly double the 1900 figure — but Historical Statistics notes 1910 data is 'not comparable with other censuses' due to different enumerator instructions. The true rate may have been lower. Total female LFPR was 25.4%. Still a predominantly single-earner era."
assumptions = ["composite-family"]

# ── Median age at first marriage ──────────────────────────────────────────

[[fact]]
id = "us-1910s-median-age-first-marriage"
quantity = 25.1
panel = "day"
label = "Median age at first marriage, 1910"
value = "Men: 25.1, Women: 21.6"
unit = "years (median age at first marriage)"
source = "census-table-ms2"
tier = "A"
notes = "From Census Table MS-2. Decennial census. The age gap was narrowing slightly: 3.5 years vs 4.0 in 1900. WWI would temporarily disrupt marriage patterns."
