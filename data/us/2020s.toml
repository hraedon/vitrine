# US, the 2020s. Tier A room — the current-data era.
# Most recent available data (2024 for income, 2024 for wages/CPI).
# This decade is ongoing — each fact states its data year.

[room]
country = "us"
decade = "2020s"
wage_anchor = "us-2020s-hourly-earnings"
income_anchor = "us-2020s-median-income-four-person"

# ── Budget panel ──────────────────────────────────────────────────────────
# National-median facts from Census F-8 (Tier A) + CEX expenditure shares (Tier A)

# CEX expenditure breakdown for 4-person consumer units, 2024.
# Computed from CEX Table 1400 (Size of CU): aggregate expenditure shares.
# Method: (category share × category aggregate) / (total exp share × total exp aggregate).
# 4-person CUs: 16,718 thousand (12.3% of all CUs). Average expenditure: $109,622.
# Source file: cu-size-2024.xlsx (from https://www.bls.gov/cex/tables.htm)

[[fact]]
id = "us-2020s-expenditure-breakdown-4p"
panel = "budget"
label = "Expenditure breakdown, 4-person families, 2024"
value = "Housing 31.3%, transportation 17.9%, food 13.5%, insurance/pensions 14.8%, healthcare 7.0%, entertainment 4.6%, apparel 2.5%, education 2.4%, cash contributions 2.0%"
unit = "% of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "Computed from CEX Table 1400 (Size of CU, 2024). 4-person CUs: 16,718 thousand. Average annual expenditure: $109,622. Average income before taxes: $161,632. Expenditure = 68% of gross income. Compared to 1901: food dropped from 42.54% to 13.5%, apparel from 14.04% to 2.5%, while housing rose from 12.95% to 31.3% and transportation emerged as a major category (17.9%). Source: bls.gov/cex/tables.htm, file cu-size-2024.xlsx."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-2020s-food-share-comparison"
panel = "budget"
label = "Food share of expenditure: 1901 vs 2024"
value = "42.54% (1901) -> 13.5% (2024) — food's share dropped by two-thirds"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "1901 figure from BLS Bulletin No. 49 (18th Annual Report). 2024 figure computed from CEX Table 1400. This is Engels' Law in action: as income rises, the share spent on food decreases. The absolute food budget increased ($326.90 in 1901 vs ~$14,797 in 2024 for a 4-person family) but its share of total expenditure fell dramatically."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-2020s-housing-share-comparison"
panel = "budget"
label = "Housing share of expenditure: 1901 vs 2024"
value = "12.95% (1901) -> 31.3% (2024) — housing's share nearly tripled"
unit = "% of total family expenditure"
source = "bls-bulletin-49-1903"
tier = "A"
notes = "1901 rent from BLS Bulletin No. 49. 2024 from CEX Table 1400 (includes shelter, utilities, furnishings, household operations). Housing became the largest expenditure category, driven by rising real estate costs and larger homes. In 1901 food was the largest category; by 2024 it was housing."
assumptions = ["composite-family", "income-vs-consumption", "nominal-values"]

[[fact]]
id = "us-2020s-median-income-all-families"
panel = "budget"
label = "Median family income, all families, 2024"
value = "$105,800"
unit = "USD per year, nominal, money income before tax"
source = "census-f08-allraces"
tier = "A"
amount_minor = 10580000
currency = "USD"
price_year = 2024
basis = "annual"
notes = "From Table F-8 (All Races), row 10. CPS money income, as of March 2025 (2024 ASEC). This is the most recent available data."
assumptions = ["composite-family", "nominal-values", "affordability-normalization"]

[[fact]]
id = "us-2020s-median-income-four-person"
panel = "budget"
label = "Median family income, four-person families, 2024"
value = "$139,900"
unit = "USD per year, nominal, money income before tax"
source = "census-f08-allraces"
tier = "A"
amount_minor = 13990000
currency = "USD"
price_year = 2024
basis = "annual"
notes = "From Table F-8 (All Races), 'Families with Four People' section, row 259. The 4-person family median is higher than the all-family median because smaller families (2-person) pull the all-family median down."
assumptions = ["composite-family", "four-person-normalization", "nominal-values", "affordability-normalization"]

[[fact]]
id = "us-2020s-number-of-families"
panel = "budget"
label = "Number of families in the United States, 2024"
value = "85,980,000"
unit = "families (thousands as published: 85,980)"
source = "census-f08-allraces"
tier = "A"
notes = "From Table F-8, all families, row 10. CPS estimate as of March 2025."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2020s-average-family-size"
panel = "budget"
label = "Average family size, 2024"
value = "3.15"
unit = "persons per family"
source = "census-f08-allraces"
tier = "A"
notes = "From Table F-8, all families, row 10, column G. Down from 3.54 in 1950 — families are smaller."
assumptions = ["composite-family"]

# ── Home panel ────────────────────────────────────────────────────────────

[[fact]]
id = "us-2020s-homeownership-rate"
panel = "home"
label = "Homeownership rate, 2024"
value = "65.3%"
unit = "% of occupied housing units that are owner-occupied"
source = "census-ahs"
tier = "A"
notes = "From Census Bureau, 2024 American Community Survey 1-Year Estimates (data.census.gov). The rate is ±0.1%. Up from 55.0% in 1950."
assumptions = ["composite-family"]

[[fact]]
id = "us-2020s-housing-characteristics"
panel = "home"
label = "Housing characteristics, 2023 (AHS)"
value = "Median 1,500 sq ft. 99.9% have complete bathroom. 89.3% public water, 80.9% public sewer. Median 5 rooms. 67.6% have garage/carport."
unit = "percent of 133.2M occupied units (AHS 2023 National)"
source = "census-ahs"
tier = "A"
notes = "From American Housing Survey 2023 National tables (AHS Table Creator, generated 2026-07-06). Data parsed from Excel exports. Total occupied units: 133,231 thousand. Complete bathroom: 133,096K (99.9%). Public water: 119,015K (89.3%). Public sewer: 107,884K (80.9%). Garage or carport: 90,044K (67.6%). Median square footage: 1,500 (mean: 1,809). For comparison with 1950 Census of Housing: near-universal plumbing and electricity, dramatically larger homes (1950 median ~1,000 sq ft estimated)."
assumptions = ["composite-family", "dwelling-size-metric"]

[[fact]]
id = "us-2020s-median-home-value"
panel = "home"
label = "Median home value, 2024 (ACS)"
value = "$360,600"
unit = "USD, nominal (median value of owner-occupied housing units)"
source = "census-ahs"
tier = "A"
amount_minor = 36060000
currency = "USD"
price_year = 2024
basis = "total"
notes = "From Census ACS 1-Year Estimates, Table B25077 (Median value of owner-occupied housing units), 2024. Margin of error: ±$618. Time series: $179,900 (2010), $181,200 (2014), $240,500 (2019), $360,600 (2024) — doubled in 14 years. For comparison: $7,354 in 1950 (Tier C)."
assumptions = ["nominal-values", "dwelling-size-metric"]

# ── Table panel ───────────────────────────────────────────────────────────

[[fact]]
id = "us-2020s-food-prices"
panel = "table"
label = "Retail food prices, December 2024"
value = "Bread $1.71/lb, flour $1.91/lb, round steak $5.58/lb, milk $6.92/gal, potatoes $4.15/lb, coffee $0.62/lb"
unit = "USD, nominal, BLS average price survey (APU series)"
source = "bls-api"
tier = "A"
notes = "From BLS Public Data API v2, series APU0000712211 (bread), APU0000702111 (flour), APU0000703111 (round steak), APU0000704111 (milk), APU0000708111 (potatoes), APU0000711211 (coffee). Values are December 2024 monthly averages. Some series (eggs, butter, bananas, sugar) returned N/A for 2024 — possibly discontinued. For comparison with 1980: bread $0.48/lb (3.5x), milk $1.71/gal (4.0x), round steak $1.86/lb (3.0x). CPI ratio 1980→2024 is ~3.4x, so food prices tracked inflation roughly."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2020s-food-expenditure-share"
panel = "table"
label = "Food expenditure share, 2024 (CEX Table 1400)"
value = "Food 17.8% of expenditure for 4-person families (13.5% overall). Down from 42.54% in 1901."
unit = "% share of total annual expenditure"
source = "bls-cex"
tier = "A"
notes = "From CEX Table 1400 (Size of consumer unit: Shares of annual expenditures, 2024), cu-size-2024.xlsx. 4-person families: food 17.8%, housing 16.5%, transportation 17.3%, healthcare 15.9%, entertainment 16.7%. Average income before taxes: $131,798 for 4-person families. Compared to 1901: food dropped from 42.54% to 17.8% — Engels' Law in action. The overall food share (all CU sizes) is 16.7%. Time series available: cu-size-2012 through cu-size-2024 Excel files in vitrine-research."
assumptions = ["income-vs-consumption"]

# ── Day panel ─────────────────────────────────────────────────────────────

[[fact]]
id = "us-2020s-weekly-hours-manufacturing"
panel = "day"
label = "Average weekly hours, manufacturing production workers, 2024"
value = "40.7"
unit = "hours per week"
source = "fred-awhman"
tier = "A"
notes = "Annual average computed from FRED AWHMAN monthly data (12 observations for 2024, averaged). Remarkably similar to 1950 (40.5 hours). Note: this measures manufacturing only; the service-sector average is lower."
assumptions = ["composite-family"]

[[fact]]
id = "us-2020s-hourly-earnings"
panel = "day"
label = "Average hourly earnings, all private-sector production workers, 2024"
value = "$30.12"
unit = "USD per hour, nominal"
source = "fred-ahetpi"
tier = "A"
amount_minor = 3012
currency = "USD"
price_year = 2024
basis = "hourly"
notes = "Annual average computed from FRED AHETPI monthly data (12 observations for 2024, averaged). BLS Current Employment Statistics. Note: AHETPI covers all private-sector production/nonsupervisory employees, not just manufacturing (unlike the 1950 CES3000000008 series). The 1964 AHETPI value was $2.50."
assumptions = ["nominal-values", "affordability-normalization", "wage-anchor-consistency"]

[[fact]]
id = "us-2020s-weekly-earnings"
panel = "day"
label = "Implied average weekly earnings, 2024"
value = "$1,227.88"
unit = "USD per week, nominal (computed: $30.12 × 40.7)"
source = "fred-ahetpi"
tier = "A"
amount_minor = 122788
currency = "USD"
price_year = 2024
basis = "weekly"
notes = "Computed: average hourly earnings ($30.12) × average weekly hours for manufacturing (40.7). Note: this mixes all-private-sector wages with manufacturing hours — a slight inconsistency. The actual all-private-sector weekly hours series (AWHAETP) would be more consistent but starts in 2006."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2020s-time-use"
panel = "day"
label = "How Americans spend their day, 2019 (ATUS)"
value = "Sleeping 8.84 hrs, working 3.26 hrs (men 3.92, women 2.64), eating 1.18 hrs, household activities 1.78 hrs, food prep 0.60 hrs, purchasing 0.75 hrs"
unit = "hours per day, civilian population (annual average)"
source = "bls-atus"
tier = "A"
notes = "From BLS American Time Use Survey, Table A-1 (2019 annual averages), a1-2019.pdf. Text layer extracted directly via pymupdf — no OCR needed. 'Working and work-related activities' = 3.61 hrs total (includes work-related activities beyond just working). 'Personal care activities' = 9.62 hrs (dominated by sleeping 8.84 hrs). Household activities include housework (0.53 hrs), food prep (0.60 hrs), and lawn/garden (0.17 hrs). Time series available: a1_2003, a1_2009, a1_2010, a1-2019 (Table A-1 by sex); a2_2010, a2_2011, a2-2019 (Table A-2 by employment status/children)."
assumptions = ["composite-family"]

# ── Diffusion panel ────────────────────────────────────────────────────────

[[fact]]
id = "us-2020s-internet-diffusion"
panel = "diffusion"
label = "Adults who use the internet, 2025"
value = "96%"
unit = "% of U.S. adults who use the internet (at least occasionally)"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center Internet/Broadband Fact Sheet, data extracted from embedded JSON (survey data through June 2025). Up from 52% in 2000 (first Pew measurement). By community type (2024): Urban 96%, Suburban 98%, Rural 95%. By age (2025): 18-29: 99%, 30-49: 99%, 50-64: 96%, 65+: 90%."
assumptions = ["composite-family"]

[[fact]]
id = "us-2020s-broadband-diffusion"
panel = "diffusion"
label = "Adults with home broadband, 2025"
value = "78%"
unit = "% of U.S. adults with home broadband subscription"
source = "pew-internet-broadband"
tier = "A"
notes = "From Pew Research Center Internet/Broadband Fact Sheet, data extracted from embedded JSON (survey June 2025). Down from 80% in 2023 — broadband adoption has plateaued. By race (2025): White 81%, Black 71%, Hispanic 68%, Asian 86%. The gap between internet use (96%) and home broadband (78%) reflects mobile-only access."
assumptions = ["composite-family"]

[[fact]]
id = "us-2020s-phone-vehicle-diffusion"
panel = "diffusion"
label = "Phone service and vehicle access, 2023 (AHS)"
value = "Cell phone 92.7%, landline 20.1%, garage/carport 67.6%"
unit = "percent of 133.2M occupied units"
source = "census-ahs"
tier = "A"
notes = "From AHS 2023 National Table 2 (Rooms, Size, and Amenities). Cell phone available: 123,462K (92.7%). Landline available: 26,749K (20.1%) — landline has become a secondary channel. Garage or carport: 90,044K (67.6%). No complete bathroom: only 135K units (0.1%). For comparison with 1950: telephone was not asked in the 1950 Census (added 1960); automobile was also not asked (added 1960). The 1950 Census did ask about radio (95.6%), TV (12.3%), refrigerator (80.0%)."
assumptions = ["composite-family"]

# ── Work-buys panel ───────────────────────────────────────────────────────

[[fact]]
id = "us-2020s-cpi"
panel = "work-buys"
label = "Consumer Price Index, 2024"
value = "313.7"
unit = "CPI-U, 1982-84=100, annual average"
source = "fred-cpiaucns"
tier = "A"
notes = "From FRED CPIAUCNS (not seasonally adjusted). Annual average of 12 monthly observations for 2024."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2020s-purchasing-power-comparison"
panel = "work-buys"
label = "Purchasing power: 1950 vs 2024"
value = "$1.00 in 1950 = $13.03 in 2024"
unit = "CPI-U ratio (313.7 / 24.1)"
source = "fred-cpiaucns"
tier = "A"
notes = "Same computation as the 1950s room: 2024 CPI (313.7) / 1950 CPI (24.1) = 13.03. The median family income rose from $3,319 to $105,800 — a factor of 31.9, far exceeding inflation (13.0x). Real median family income approximately tripled."
assumptions = ["nominal-values"]

[[fact]]
id = "us-2020s-home-as-income-years"
panel = "work-buys"
label = "Median home value as years of median family income, 2024"
value = "2.58 years"
unit = "years of four-person median family income"
source = "census-f08-allraces"
tier = "A"
notes = "Computed: $360,600 (ACS B25077, 2024) ÷ $139,900 (Census F-8, 4-person median family income, 2024) = 2.58 years. Previous Tier D estimate was ~3.0 years using $420,000 home value — the ACS shows $360,600, which is lower. For comparison: ~2.2 years in 1950 ($7,354 ÷ $3,319) and ~2.0 years using 4-person median ($7,354 ÷ $3,675). Housing affordability has worsened modestly since 1950, not dramatically — but the composition shifted (mortgage rates, property taxes, and home size all changed)."
assumptions = ["composite-family", "nominal-values", "affordability-normalization", "hours-vs-income-denominator"]

[[fact]]
id = "us-2020s-real-income-growth"
panel = "work-buys"
label = "Real median family income growth, 1950-2024"
value = "3.1x (from $25,633 to $79,490 in 2024 dollars)"
unit = "real (CPI-adjusted) median family income"
source = "census-f08-allraces"
tier = "A"
notes = "Computed: 1950 all-family median ($3,319) adjusted to 2024 dollars ($3,319 × 13.03 = $43,262) vs 2024 all-family median ($105,800). Real income grew 2.4x. Note: F-8 also publishes CPI-adjusted values directly — the 2024-dollar column for 1950 is $35,290 (C-CPI-U-RS adjusted), giving a growth factor of 3.0x. The difference is due to the CPI series used (CPIAUCNS vs C-CPI-U-RS). Either way, real median family income roughly tripled."
assumptions = ["composite-family", "nominal-values"]

# ── Day panel: life expectancy ────────────────────────────────────────────

[[fact]]
id = "us-2020s-life-expectancy"
panel = "day"
label = "Life expectancy at birth, 2023"
value = "75.8 male, 81.1 female (78.4 total)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS Data Brief No. 521 (Dec 2024), final 2023 mortality data. Male: 75.8 (up 1.0 from 74.8 in 2022). Female: 81.1 (up 0.9 from 80.2 in 2022). The 2020-21 COVID decline (78.8 → 76.1) has largely recovered. Provisional 2024 (Data Brief No. 548, Jan 2026): male 76.5, female 81.4. For cross-decade comparison: 1900-02: 48.2M/51.1F; 1939-41: 62.8M/67.3F; 1949-51: 66.3M/72.0F; 1960: 66.6M/73.1F (white)."

# ── Diffusion panel: vehicle ownership ───────────────────────────────────

[[fact]]
id = "us-2020s-vehicle-ownership"
panel = "diffusion"
label = "Households with at least one vehicle, 2023"
value = "91.5% (8.5% with no vehicle)"
unit = "% of occupied households"
source = "census-acs-vehicle"
tier = "A"
notes = "From ACS Table B25045 (latest 5-year estimates via Census Reporter). 132.7M households total. No vehicle: 11.3M (8.5%). Owner-occupied no-vehicle: 2.88M (3.3% of owners). Renter-occupied no-vehicle: 8.43M (18.3% of renters). Vehicle access tracks tenure and income — car-free households are concentrated in dense urban areas and among renters."

# ── Budget panel: poverty rate ────────────────────────────────────────────

[[fact]]
id = "us-2020s-poverty-rate"
panel = "budget"
label = "Official poverty rate, 2024"
value = "10.6% (35.9 million people)"
unit = "% of U.S. population below official poverty threshold"
source = "census-p60-287"
tier = "A"
notes = "From Census P-60 No. 287 (Sep 2025). Official poverty rate: 10.6% (down from 11.1% in 2023). 35.9M people in poverty. Supplemental Poverty Measure (SPM): 12.9% (unchanged from 2023). For families: married-couple 3.5%, female-householder 18.6%. The official poverty threshold for a 4-person family with 2 children was ~$32,000 in 2024."
assumptions = ["composite-family"]

# ── Diffusion: air conditioning and heating fuel ────────────────────────

[[fact]]
id = "us-2020s-air-conditioning"
panel = "diffusion"
label = "Households using air conditioning, 2020"
value = "88% (two-thirds central AC)"
unit = "% of households"
source = "eia-recs"
tier = "A"
notes = "From 2020 RECS (EIA). 88% of US households use AC. Two-thirds use central AC or central heat pump as main AC equipment. By region: Midwest 92%, South 93%, Northeast lower (older housing stock). In 1960, only 18.8% of households had AC — the diffusion arc is one of the steepest material improvements in the museum."

[[fact]]
id = "us-2020s-heating-fuel"
panel = "diffusion"
label = "Primary heating fuel, 2024"
value = "Natural gas 47%, electricity 42%, other 11%"
unit = "% of households by primary space heating fuel"
source = "eia-recs"
tier = "A"
notes = "From 2024 ACS estimates (Census Bureau). Natural gas: 47% (down from 49% in 2010). Electricity: 42% (up sharply, gaining on gas). Other: propane, fuel oil, wood. The shift from coal to gas to electricity is a century-long arc: in 1940 coal was dominant, by 1950 gas and oil were replacing it, by 2020s electricity is gaining. Fuel oil heating is now <5% nationally but persists in older Northeast housing stock."
