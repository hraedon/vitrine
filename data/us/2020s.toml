assumptions = ["composite-family", "nominal-values"]

[[fact]]
id = "us-2020s-car-price"
panel = "work-buys"
label = "Average new car transaction price, 2020"
value = "$27,366"
unit = "USD, nominal (average transaction price, domestic + import)"
source = "bea-new-car-price"
tier = "A"
amount_minor = 2736600
currency = "USD"
price_year = 2020
basis = "total"
notes = "From BEA Average Transaction Price per New Car (ORNL TEDB Table 11.13, Edition 40 — last published year). The BEA notes: 'The average price for cars increased from 2019 to 2020.' Post-2020 prices are not available in this series; industry sources (NADA, KBB) report average new car prices exceeding $47,000 by 2023, but those figures include SUVs and trucks. Population: all new passenger cars sold in the US."
assumptions = ["nominal-values"]

# CPI-inflated 2024 estimate from the 2020 BEA base (Plan 012 WI-1).
# Computed: $27,366 x CPI_new_vehicles[2024]/CPI_new_vehicles[2020].
# The result is an estimate, not a transcription; the all-vehicles industry
# figure (~$47,000) includes SUVs/trucks the BEA series excludes.
[[derived]]
id = "us-2020s-car-price-2024-estimate"
panel = "work-buys"
label = "Average new car transaction price, 2024 (CPI-inflated estimate)"
unit = "USD, nominal (estimated from 2020 BEA base x new-vehicles CPI)"
op = "inflate"
numerator = "us-2020s-car-price"
denominator = ""
precision = 0
inflate_series = "cpi-new-vehicles"
inflate_from_year = 2020
inflate_to_year = 2024
notes = "The BEA transaction-price series ends in 2020. This estimate inflates the 2020 base ($27,366) to 2024 using the BLS CPI for new vehicles (CUUR0000SETA01): 147.600 (2020) -> 177.886 (2024). The result excludes pickups/vans/SUVs, so it sits well below the ~$47,000 industry all-vehicle average."
assumptions = ["nominal-values", "cpi-inflation-of-base-price"]

# ── Day panel: life expectancy ────────────────────────────────────────────

[[fact]]
id = "us-2020s-life-expectancy"
quantity = 79.0
price_year = 2024
panel = "day"
label = "Life expectancy at birth, 2024"
value = "76.5 male, 81.4 female (79.0 total)"
unit = "years"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS Data Brief No. 548 (Jan 2026), final 2024 mortality data. Male: 76.5 (up 0.7 from 75.8 in 2023). Female: 81.4 (up 0.3 from 81.1 in 2023). Total 79.0 (up 0.4 from 78.6 in 2023). The 2020-21 COVID decline (78.8 -> 76.1) has fully recovered and exceeded the pre-pandemic level. For cross-decade comparison: 1900-02: 48.2M/51.1F; 1939-41: 62.8M/67.3F; 1949-51: 66.3M/72.0F; 1960: 66.6M/73.1F (white)."

[[fact]]
id = "us-2020s-infant-mortality"
quantity = 5.525
price_year = 2024
panel = "day"
label = "Infant mortality rate, 2024"
value = "5.525 per 1,000 live births (552.5 per 100,000)"
unit = "deaths before age 1 per 1,000 live births"
source = "nchs-nvss"
tier = "A"
notes = "From NCHS Data Brief No. 548 (Jan 2026), final 2024 mortality data. 2024 rate: 552.5 infant deaths per 100,000 live births (5.525 per 1,000) — not significantly different from 2023 (560.2 per 100,000 = 5.602 per 1,000). For cross-decade comparison: 1900: ~100 per 1,000; 1915: 99.9; 1997: 7.2. The century-long decline exceeds 90% — one of the greatest public health achievements. Persistent racial disparities: Black infant mortality is ~2x the national average."

# ── Diffusion panel: vehicle ownership ───────────────────────────────────

[[fact]]
id = "us-2020s-vehicle-ownership"
quantity = 91.5
panel = "diffusion"
label = "Households with at least one vehicle, 2023"
value = "91.5% (8.5% with no vehicle)"
unit = "% of occupied households"
source = "census-acs-vehicle"
tier = "A"
notes = "From ACS Table B25045 (latest 5-year estimates via Census Reporter). 132.7M households total. No vehicle: 11.3M (8.5%). Owner-occupied no-vehicle: 2.88M (3.3% of owners). Renter-occupied no-vehicle: 8.43M (18.3% of renters). Vehicle access tracks tenure and income — car-free households are concentrated in dense urban areas and among renters."

# ── Budget panel: poverty rate ────────────────────────────────────────────

[[fact]]
id = "us-2020s-poverty-rate"
quantity = 10.6
panel = "budget"
label = "Official poverty rate, 2024"
value = "10.6% (35.9 million people)"
unit = "% of U.S. population below official poverty threshold"
source = "census-p60-287"
tier = "A"
notes = "From Census P-60 No. 287 (Sep 2025). Official poverty rate: 10.6% (down from 11.1% in 2023). 35.9M people in poverty. Supplemental Poverty Measure (SPM): 12.9% (unchanged from 2023). For families: married-couple 3.5%, female-householder 18.6%. The official poverty threshold for a 4-person family with 2 children was ~$32,000 in 2024."
assumptions = ["composite-family"]

# ── Diffusion: air conditioning and heating fuel ────────────────────────

[[fact]]
id = "us-2020s-air-conditioning"
quantity = 88
panel = "diffusion"
label = "Households using air conditioning, 2020"
value = "88% (two-thirds central AC)"
unit = "% of households"
source = "eia-recs"
tier = "A"
notes = "From 2020 RECS (EIA). 88% of US households use AC. Two-thirds use central AC or central heat pump as main AC equipment. By region: Midwest 92%, South 93%, Northeast lower (older housing stock). In 1960, only 18.8% of households had AC — the diffusion arc is one of the steepest material improvements in the museum."

[[fact]]
id = "us-2020s-heating-fuel"
panel = "diffusion"
label = "Primary heating fuel, 2024"
value = "Natural gas 47%, electricity 42%, other 11%"
unit = "% of households by primary space heating fuel"
source = "census-acs"
tier = "A"
notes = "From 2024 ACS 1-year estimates, Table B25040 (House Heating Fuel). Natural gas: 47% (down from 49% in 2010). Electricity: 42% (up sharply, gaining on gas). Other: propane, fuel oil, wood. (Source re-pointed from eia-recs 2026-07-07: the figures are ACS, not RECS.) The shift from coal to gas to electricity is a century-long arc: in 1940 coal was dominant, by 1950 gas and oil were replacing it, by 2020s electricity is gaining. Fuel oil heating is now <5% nationally but persists in older Northeast housing stock."

[[fact]]
id = "us-2020s-tv-watching-decline"
quantity = 72.8
panel = "diffusion"
label = "Percent of population watching TV, 2024"
value = "72.8% of population watched TV on an average day (2024), down from 78.8% in 2003"
unit = "% of population watching TV on an average day"
source = "bls-atus"
tier = "A"
notes = "From BLS American Time Use Survey, Table A-1 (2024 annual averages). The decline from 78.8% (2003) to 72.8% (2024) reflects cord-cutting and the shift to streaming and online video. Average daily TV watching time declined from 2.58 hrs (2003) to 2.60 hrs (2024), having peaked at 2.82 hrs in 2009. By 2017, ~411 million mobile wireless connections existed (FCC 18-181)."
assumptions = ["composite-family"]

[[fact]]
id = "us-2020s-home-production-splice"
panel = "day"
label = "Home-production hours: Ramey endpoint vs ATUS (concept splice)"
value = "Ramey 2005: women 29.3, men 16.8 hrs/week (ages 18–64) → ATUS 2024: household activities 2.01 hrs/day, all adults 15+"
unit = "hours per week vs hours per day — not directly comparable"
source = "ramey-2009"
tier = "C"
notes = "Concept splice (Plan 004 Measure guard): Ramey measures unpaid home production (food prep, cleaning, clothing care, childcare, purchasing, management) for prime-age women and men separately, ages 18-64, in hours/week. ATUS (us-2020s-time-use, source bls-atus, 2024 annual averages) measures 'household activities' for all adults 15+ in hrs/day, without gender breakdown in the headline figure. The two series are NOT directly comparable: (1) different activity definitions (Ramey's 'home production' is broader than ATUS 'household activities'), (2) different populations (prime-age vs all-adult), (3) different units (weekly vs daily). When plotted on the same axis, this splice must carry a caveat banner. The Ramey series is the thesis spine (women's hours falling); ATUS is the modern anchor point."
assumptions = ["composite-family"]
