server {
    listen 8080;
    server_name _;
    root /out;
    index index.html;

    # Relative links throughout the site → no path rewriting needed.
    location / {
        try_files $uri $uri/ =404;
    }

    # Static files are immutable per image tag; aggressive caching is safe.
    # (There are no external assets today, but if any land they inherit this.)
    location ~* \.(html|css|js|svg|png|jpg|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}